# contract header
schema_version: "1.0"
contract: output
skill: assistant-docs

artifacts:
  - name: files_updated
    type: object[]
    required: true
    description: "List of files created or modified with documentation"
    min_items: 1
    on_fail: "Re-run skill to produce the missing artifact"
    object_fields:
      - name: path
        type: string
        required: true
        description: "File path that was created or modified"
      - name: change_type
        type: enum
        required: true
        enum_values: [created, modified]
        description: "Whether the file was newly created or modified"
      - name: description
        type: string
        required: true
        description: "What documentation was added or changed"

  - name: evidence_sources
    type: object[]
    required: true
    description: "Source files, tests, configs, existing docs, git history, or user-provided material used as documentation truth"
    min_items: 1
    validation: "Every concrete doc claim should trace to at least one evidence source or be listed in review_items"
    on_fail: "Inspect source material and record evidence before finalizing docs"
    object_fields:
      - name: source
        type: string
        required: true
      - name: claims_supported
        type: string
        required: true

  - name: doc_coverage
    type: string
    required: true
    description: "Summary of what is documented and what gaps remain"
    validation: "Non-empty string covering both documented and undocumented areas"
    on_fail: "Re-run skill to produce the missing artifact"

  - name: review_items
    type: string[]
    required: true
    description: "Inferred, stale, conflicting, or audience-sensitive claims requiring user or maintainer review; empty only when none remain"
    validation: "Must list every unverified or sensitive claim instead of silently presenting it as fact"
    on_fail: "Move unsupported claims to review_items or remove them from docs"

  - name: safety_notes
    type: string[]
    required: true
    description: "Redactions, sensitive/internal details omitted, or ['none'] when no safety-sensitive content was encountered"
    validation: "Must not include the sensitive value itself"
    on_fail: "Redact sensitive content and summarize the omission without exposing values"

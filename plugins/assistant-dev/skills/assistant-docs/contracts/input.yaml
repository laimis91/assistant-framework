# contract header
schema_version: "1.0"
contract: input
skill: assistant-docs

fields:
  - name: doc_type
    type: enum
    required: true
    description: "What kind of documentation to generate"
    validation: "Must be a supported documentation type"
    on_missing: ask
    enum_values: [api, architecture, readme, changelog, migration, inline_comments, explainer]

  - name: scope
    type: string
    required: true
    description: "What to document — a feature, module, or entire project"
    validation: "Non-empty string identifying the documentation target"
    on_missing: ask

  - name: source_files
    type: string[]
    required: false
    description: "Specific files to document"
    validation: "Each entry must be a valid file path"
    on_missing: infer

  - name: audience
    type: enum
    required: false
    description: "Intended audience for the documentation"
    validation: "Defaults to internal when not specified; public docs require extra sensitivity review"
    on_missing: infer
    enum_values: [internal, public, maintainers, onboarding]

  - name: evidence_policy
    type: enum
    required: false
    description: "How strictly claims must be backed by local source evidence"
    validation: "Use strict for public or release docs"
    on_missing: infer
    enum_values: [strict, normal]

  - name: format
    type: enum
    required: false
    description: "Output format for generated documentation"
    validation: "Defaults to markdown when not specified"
    on_missing: infer
    enum_values: [markdown, xml_comments, jsdoc]

# contract header
schema_version: "1.0"
contract: input
skill: assistant-diagrams

fields:
  - name: diagram_type
    type: enum
    required: true
    description: "What kind of diagram to generate"
    validation: "Must be a supported diagram type"
    on_missing: ask
    enum_values: [architecture, sequence, er, flow, component, class, state]

  - name: scope
    type: string
    required: true
    description: "What to diagram — a feature, module, data model, etc."
    validation: "Non-empty string identifying the diagram target"
    on_missing: ask

  - name: source_files
    type: string[]
    required: false
    description: "Files to analyze for the diagram"
    validation: "Each entry must be a valid file path"
    on_missing: infer

  - name: format
    type: enum
    required: false
    description: "Output format for the diagram"
    validation: "Defaults to mermaid when not specified"
    on_missing: infer
    enum_values: [mermaid, plantuml]

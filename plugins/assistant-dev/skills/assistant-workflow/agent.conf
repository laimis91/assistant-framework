# Agent Configuration
# Defines which AI agent CLI to use and agent-specific paths.
# Source this file in scripts: source "$(dirname "$0")/../agent.conf"
#
# Supported agents: claude, codex, gemini
# To switch agents, change AGENT_CLI and AGENT_PROMPT_ARG below.

# ── Agent CLI ────────────────────────────────────────────────────────────────

# Which agent to use for headless/scripted execution
AGENT_NAME="claude"

# Command to run the agent in headless mode with a prompt
# Each agent has different CLI syntax:
#   claude:  claude -p "PROMPT" --cwd DIR
#   codex:   codex exec "PROMPT" --cwd DIR
#   gemini:  gemini -p "PROMPT" --cwd DIR
AGENT_CLI="claude"
AGENT_PROMPT_ARG="-p"
AGENT_CWD_FLAG="--cwd"

# ── Paths ────────────────────────────────────────────────────────────────────

# Where the agent stores its working state (task journal, session files)
# Claude Code uses .claude/, Codex uses .codex/, etc.
AGENT_STATE_DIR=".claude"

# Task journal location (inside AGENT_STATE_DIR)
TASK_JOURNAL="task.md"

# ── Agent-specific instruction file ──────────────────────────────────────────

# All three agents use the same skill format:
#   ~/.{agent}/skills/assistant/SKILL.md
AGENT_INSTRUCTIONS_FILE="SKILL.md"

# ── Workspace strategy ───────────────────────────────────────────────────────

# How to isolate parallel agent work
# worktree: git worktrees (recommended, same repo)
# directory: copy the repo (slower, works without git)
WORKSPACE_STRATEGY="worktree"

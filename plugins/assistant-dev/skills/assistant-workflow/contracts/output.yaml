# Workflow Output Contract
# Defines what a completed workflow MUST produce.
# Any agent executing this skill MUST verify all required artifacts exist
# before printing --- WORKFLOW COMPLETE ---.

schema_version: "1.0"
contract: output
skill: assistant-workflow

# Completion evidence is tiered so small/low-risk work does not inherit the
# full medium+ harness. Artifact definitions below remain the source of truth;
# these tiers define which artifacts are required by default for each class.
completion_tiers:
  small:
    required_artifacts: [changed_files, validation_results, manual_test_steps, user_approval]
    conditional_artifacts: [triage_result, subagent_evidence, test_results, debugging_result, artifact_contract]
    review_gate: "self-review or explicit validation summary unless risk_tier in [high, critical]"
    checkpoint_policy: "inline plan/check summary is enough; phase_checkpoints are strict-profile only"
  medium:
    required_artifacts: [triage_result, changed_files, validation_results, subagent_evidence, spec_review_result, review_result, learning_controller, manual_test_steps, plan_document, user_approval]
    conditional_artifacts: [test_results, task_journal, context_map, slice_manifest, single_slice_rationale, slice_verification_summary, metrics_entry, candidate_search_result]
    review_gate: "spec review plus quality review, with evidence matched to the approved plan"
    checkpoint_policy: "task journal or carried-forward state records phase transitions"
  large_critical:
    required_artifacts: [triage_result, phase_checkpoints, changed_files, test_results, validation_results, subagent_evidence, spec_review_result, review_result, learning_controller, manual_test_steps, task_journal, context_map, context_budget_note, slice_manifest, slice_verification_summary, plan_document, user_approval]
    conditional_artifacts: [debugging_result, artifact_contract, pattern_retrieval_note, decomposition_plan_review, single_slice_rationale, metrics_entry, candidate_search_result, verified_skill_distillation]
    review_gate: "full strict evidence, security/operability review when applicable, and all slice criteria verified"
    checkpoint_policy: "explicit phase checkpoints are required"

artifacts:
  - name: triage_result
    type: object
    required: conditional
    condition: "size in [medium, large, mega] or hook_profile == strict or risk_tier in [high, critical]"
    validation: "Contains task_type, risk_tier, size, required_gates, required_agents, subagent policy state, execution mode, authorization scope, search_mode, and candidate_scope_scan selected during Triage"
    on_fail: "Return to TRIAGE and populate task_type, risk_tier, size, required_gates, required_agents or fallback roles, subagent policy state, execution mode, authorization scope, search_mode, and candidate_scope_scan"
    object_fields:
      - name: task_type
        type: enum
        required: true
        enum_values: [feature, bugfix, refactor, migration, rewrite, config, infra, security, docs, spike]
      - name: risk_tier
        type: enum
        required: true
        enum_values: [low, moderate, high, critical]
      - name: size
        type: enum
        required: true
        enum_values: [small, medium, large, mega]
      - name: required_gates
        type: string[]
        required: true
        validation: "At least the common gates plus every applicable task-category gate pack"
      - name: required_agents
        type: string[]
        required: true
        validation: "Required workflow roles and skills selected from size, task type, and risk tier"
      - name: subagent_policy_state
        type: enum
        required: true
        enum_values: [not_required, authorization_required, delegation_authorized, authorization_denied, subagents_unavailable, policy_disallowed]
        validation: "Resolved before any subagent dispatch. authorization_required must transition to delegation_authorized, authorization_denied, subagents_unavailable, or policy_disallowed before Build/Review."
      - name: subagent_execution_mode
        type: enum
        required: true
        enum_values: [delegated, direct_fallback, not_applicable]
        validation: "delegated means subagents will be spawned; direct_fallback means the orchestrator preserves equivalent role evidence without spawning; not_applicable means no subagent role is needed."
      - name: subagent_authorization_scope
        type: string[]
        required: true
        validation: "Empty unless explicit authorization was granted. When populated, names the authorized roles, phases, or actions."
      - name: search_mode
        type: enum
        required: true
        enum_values: [none, lightweight, candidate_search]
        validation: "Selected during Triage from uncertainty, alternatives, optimization pressure, repeated failures, unclear bugs, and reviewer-requested pivots"
      - name: candidate_scope_scan
        type: object
        required: true
        description: "Quick read-only scan used during Triage to avoid prompt-only size/risk classification"
        validation: "Summarizes likely touched paths, symbols/search terms checked, adjacent verification/reference surfaces, confidence, and unknowns"
        object_fields:
          - name: likely_touched_paths
            type: string[]
            required: true
            validation: "Exact paths when known; otherwise directories/modules or unknown with reason"
          - name: symbols_or_terms_searched
            type: string[]
            required: true
            validation: "Search terms, symbols, or commands checked; use an explicit none-with-reason entry only when no local scan is useful"
          - name: adjacent_surfaces
            type: string[]
            required: true
            validation: "Tests, docs, contracts, config, generated mirrors, hooks, APIs, or runtime surfaces that Discover should inspect or mark not applicable"
          - name: confidence
            type: enum
            required: true
            enum_values: [low, medium, high]
          - name: unknowns
            type: string[]
            required: true
            validation: "Remaining scope/risk unknowns for Discover, or empty when confidence is high"

  - name: phase_checkpoints
    type: string[]
    required: conditional
    condition: "hook_profile == strict or size in [large, mega] or local task journal is enforcing phase gates"
    validation: >
      Must contain paired entries for every phase that ran:
      '--- PHASE: {name} ---' at start and '--- PHASE: {name} COMPLETE ---' at end.
      Missing checkpoints = workflow was not followed.
    on_fail: "Reconstruct phase_checkpoints from executed phases or re-run missing phase gates before completion"
    minimum_entries:
      # TRIAGE has no COMPLETE marker (checkpoint_end: null), so it contributes 1.
      # All other phases contribute 2 (start + complete).
      small: 11   # TRIAGE(1) + DISCOVER(2) + PLAN(2) + BUILD(2) + REVIEW(2) + DOCUMENT(2)
      medium: 13  # + DECOMPOSE(2), Design optional
      large: 15   # + DECOMPOSE(2) + DESIGN(2)
      mega: 9     # TRIAGE(1) + DISCOVER(2) + DECOMPOSE(2) + REVIEW(2) + DOCUMENT(2); slice checkpoints are additional

  - name: changed_files
    type: object[]
    required: true
    condition: always
    validation: "At least 1 entry unless task was determined unnecessary during Discovery"
    on_fail: "List changed files or record that Discovery determined no change was necessary"
    object_fields:
      - name: path
        type: string
        required: true
        validation: "Relative file path that exists in the project"
      - name: change_type
        type: enum
        required: true
        enum_values: [created, modified, deleted]
      - name: description
        type: string
        required: true
        validation: "1 sentence explaining what changed and why"

  - name: debugging_result
    type: object
    required: conditional
    condition: "task_type == bugfix and debugging_mode in [root_cause_unknown, completed, blocked] or assistant-debugging was used"
    description: "Evidence-first debugging summary for bugfixes whose cause was unknown or needed confirmation"
    validation: "Must summarize reproduction, hypotheses, root cause status, confidence, residual risks, and whether/why the task transitioned into assistant-tdd"
    on_fail: "Load assistant-debugging, reproduce or record the blocker, evaluate competing hypotheses, and populate debugging evidence before implementation or TDD handoff"
    object_fields:
      - name: status
        type: enum
        required: true
        enum_values: [fixed, root_cause_found, mitigated, not_reproduced, blocked, inconclusive]
      - name: reproduction_status
        type: enum
        required: true
        enum_values: [yes, no, blocked, partial]
      - name: hypotheses_count
        type: int
        required: true
        validation: ">= 3 unless fewer_hypotheses_reason is populated in assistant-debugging output"
      - name: root_cause
        type: string
        required: true
        validation: "Confirmed cause, mitigation target, or explicit unknown/inconclusive status"
      - name: confidence
        type: enum
        required: true
        enum_values: [high, medium, low]
      - name: transition_to_tdd
        type: enum
        required: true
        enum_values: [ready, not_applicable, blocked]
        validation: "ready only when a meaningful regression test can be written from debugging evidence"
      - name: residual_risks
        type: string[]
        required: true

  - name: test_results
    type: object
    required: true
    condition: "runnable tests exist or task changes behavior"
    validation: "passed + failed + skipped must equal total tests run. failed must be 0 at workflow completion. Use validation_results when tests are not applicable."
    on_fail: "Re-run tests or move non-test verification to validation_results with explicit not-applicable reason for tests"
    object_fields:
      - name: passed
        type: int
        required: true
        validation: ">= 0 (may be 0 only when tests were not applicable and validation_results is populated)"
      - name: failed
        type: int
        required: true
        validation: "Must be 0 at workflow completion"
      - name: skipped
        type: int
        required: true

  - name: validation_results
    type: object[]
    required: true
    condition: "always"
    validation: "At least one test, build, lint, typecheck, inspection, dry-run, or manual validation entry with result=passed must be recorded for completed implementation workflows. Docs-only/no-op/discovery tasks may complete without passed validation only when the reason is explicitly recorded. Skipped/not_applicable entries do not satisfy completion evidence."
    on_fail: "Run an appropriate verification and record passed evidence, or record an explicit docs-only/no-op/discovery exception reason"
    object_fields:
      - name: command_or_check
        type: string
        required: true
      - name: result
        type: enum
        required: true
        enum_values: [passed, failed, skipped, not_applicable]
      - name: evidence
        type: string
        required: true

  - name: review_result
    type: object
    required: conditional
    condition: "size in [medium, large, mega] or risk_tier in [high, critical] or hook_profile == strict"
    validation: "Stage 2 assistant-review quality result only. Spec compliance is recorded in spec_review_result."
    on_fail: "Run assistant-review quality review and record quality status, rounds, and resolved findings"
    object_fields:
      - name: quality_review_status
        type: enum
        required: true
        enum_values: [clean, has_remaining]
      - name: review_rounds
        type: int
        required: true
        validation: ">= 1 and <= 10"
      - name: must_fix_resolved
        type: int
        required: true
      - name: should_fix_resolved
        type: int
        required: true

  - name: spec_review_result
    type: object
    required: conditional
    condition: "size in [medium, large, mega] or risk_tier in [high, critical] or hook_profile == strict"
    validation: >
      Dedicated Stage 1 spec compliance result from references/prompts/spec-review.md.
      Must be distinct from assistant-review quality findings. At completion, status must
      be PASS and required_fixes must be empty or fully resolved.
    on_fail: "Run dedicated spec compliance review until status is PASS and required fixes are empty or resolved"
    object_fields:
      - name: status
        type: enum
        required: true
        enum_values: [PASS]
      - name: scope_reviewed
        type: string
        required: true
        validation: "Plan step(s), task packet(s), or slice(s) reviewed"
      - name: missing_acceptance_criteria
        type: string[]
        required: true
        validation: "Empty only when none are missing"
      - name: extra_scope
        type: string[]
        required: true
        validation: "Empty only when no unapproved extra scope remains"
      - name: changed_files_mismatch
        type: string[]
        required: true
        validation: "Empty only when actual changed files match approved scope or approved deviations"
      - name: verification_evidence_mismatch
        type: string[]
        required: true
        validation: "Empty only when recorded evidence matches required commands, success signals, and criteria"
      - name: required_fixes
        type: string[]
        required: true
        validation: "Must be empty or explicitly resolved before workflow completion"

  - name: learning_controller
    type: object
    required: conditional
    condition: "size in [medium, large, mega]"
    description: "Document-phase learning decision that reviews review/build/user-correction evidence and either persists durable lessons or records why nothing was saved"
    validation: "Task journal or equivalent workflow output contains a canonical '### Learning Controller' block with memory trend status, evidence reviewed, review findings considered, build/test failures considered, user corrections considered, durable lesson decision, and persistence evidence or no-save rationale"
    on_fail: "During Document, add the Learning Controller block by checking memory trends when available, reviewing Review Log findings, build/test failures, and user corrections, then recording a durable-save/no-save decision. Do not save random task progress as a lesson."
    object_fields:
      - name: memory_trend_checked
        type: enum
        required: true
        enum_values: [checked, backend_unavailable, policy_disallowed, not_configured]
        validation: "checked only when a configured local memory trend/backend check actually ran; otherwise use the explicit unavailable or policy outcome"
        on_missing: fail
      - name: learning_evidence_reviewed
        type: object[]
        required: true
        validation: "At least one entry summarizing the review/build/user-correction evidence considered, or one none entry explaining that no lesson-bearing evidence existed"
        min_items: 1
        on_missing: fail
        object_fields:
          - name: evidence_type
            type: enum
            required: true
            enum_values: [review_finding, build_test_failure, user_correction, memory_trend, none]
            on_missing: fail
          - name: source_reference
            type: string
            required: true
            validation: "Review Log heading, Builder/Tester result, user correction text reference, memory tool evidence, or explicit none-with-reason"
            on_missing: fail
          - name: summary
            type: string
            required: true
            validation: "Concrete evidence summary; routine task progress alone is invalid"
            on_missing: fail
      - name: review_findings_considered
        type: string[]
        required: true
        validation: "Review findings assessed for durable lessons, or a single explicit none-with-reason entry"
        on_missing: fail
      - name: build_test_failures_considered
        type: string[]
        required: true
        validation: "Build/test failures assessed for durable lessons, or a single explicit none-with-reason entry"
        on_missing: fail
      - name: user_corrections_considered
        type: string[]
        required: true
        validation: "User corrections assessed for durable lessons, or a single explicit none-with-reason entry"
        on_missing: fail
      - name: durable_lesson_decision
        type: enum
        required: true
        enum_values: [durable_saved, durable_updated, skipped_not_durable, backend_unavailable, policy_disallowed, refused_sensitive]
        validation: "durable_saved/durable_updated require backend persistence evidence; skip outcomes require a concrete no-save rationale"
        on_missing: fail
      - name: persistence_evidence
        type: string
        required: conditional
        condition: "durable_lesson_decision in [durable_saved, durable_updated]"
        validation: "Names the configured memory/reflexion backend or tool call evidence used to persist the lesson"
        on_missing: fail
      - name: no_save_rationale
        type: string
        required: conditional
        condition: "durable_lesson_decision in [skipped_not_durable, backend_unavailable, policy_disallowed, refused_sensitive]"
        validation: "Explains why no durable memory write occurred, including backend unavailable or policy-disallowed outcomes when applicable"
        on_missing: fail

  - name: manual_test_steps
    type: string[]
    required: true
    condition: "user-runnable behavior changed or release handoff needs manual verification"
    validation: "At least 1 actionable step the user can follow to verify the change"
    on_fail: "Add actionable manual validation steps or state why manual validation is not applicable"

  - name: subagent_evidence
    type: object
    required: conditional
    condition: "development/code-work task changes project source, tests, docs, config, hooks, contracts, or generated project artifacts"
    description: "Strict evidence that required subagent roles were dispatched or explicitly handled through direct fallback."
    validation: "required_agents includes at minimum Code Writer, Builder/Tester, and Reviewer. delegated mode records dispatch and result evidence for each required role; medium+ delegated work records per-slice dispatch evidence when slices apply. direct_fallback records one explicit policy reason (authorization_denied, subagents_unavailable, or policy_disallowed) plus equivalent role, phase, verification, and review evidence. not_applicable is invalid for source-changing Build tasks."
    on_fail: "Update the task journal Agent Dispatch Log. If delegated, add Code Writer, Builder/Tester, and Reviewer dispatch/result evidence and medium+ per-slice dispatch evidence. If direct_fallback, add the explicit policy reason and role-equivalent evidence. Do not complete with silent fallback."
    object_fields:
      - name: execution_mode
        type: enum
        required: true
        enum_values: [delegated, direct_fallback]
      - name: required_roles
        type: string[]
        required: true
        validation: "Includes Code Writer, Builder/Tester, and Reviewer for source-changing work."
      - name: delegated_dispatch_results
        type: object[]
        required: conditional
        condition: "execution_mode == delegated"
        validation: "Each required role has dispatch evidence and result evidence."
      - name: direct_fallback_reason
        type: enum
        required: conditional
        condition: "execution_mode == direct_fallback"
        enum_values: [authorization_denied, subagents_unavailable, policy_disallowed]
      - name: direct_fallback_role_evidence
        type: object[]
        required: conditional
        condition: "execution_mode == direct_fallback"
        validation: "Contains equivalent Code Writer, Builder/Tester, and Reviewer role/phase/verification/review evidence."
      - name: per_slice_dispatch_evidence
        type: object[]
        required: conditional
        condition: "size in [medium, large, mega] and execution_mode == delegated and slices apply"

  - name: task_journal
    type: file
    required: conditional
    condition: "size in [medium, large, mega] and agent_state_dir is configured and policy allows local state artifacts"
    validation: "Ignored orchestrator-owned state artifact exists at {agent_state_dir}/task.md and contains Status: DONE"
    on_fail: "Create or update task journal when configured and policy-allowed, or record carried-forward state fallback"
    location: "{agent_state_dir}/task.md"

  - name: context_map
    type: file
    required: conditional
    condition: "size in [medium, large, mega] and agent_state_dir is configured and policy allows local state artifacts"
    validation: "Ignored orchestrator-owned state artifact exists at {agent_state_dir}/context-map.md"
    on_fail: "Create context map when configured and policy-allowed, or include context map in carried-forward plan/task packet"
    location: "{agent_state_dir}/context-map.md"

  - name: context_budget_note
    type: object
    required: conditional
    condition: "size in [medium, large, mega] or material exceeds faithful single-context review"
    description: "Record of exact, summarized, omitted, and split/delegated context"
    validation: "Must list exact/pinned material, summarized material, omitted/deferred material, and split/delegation plan or not_applicable reason"
    on_fail: "Load references/context-budget-and-pattern-retrieval.md and add Context Budget note to plan/task packet"
    object_fields:
      - name: exact_pinned
        type: string[]
        required: true
      - name: summarized
        type: string[]
        required: true
      - name: omitted_or_deferred
        type: string[]
        required: true
      - name: split_or_delegation_plan
        type: string
        required: true

  - name: pattern_retrieval_note
    type: object
    required: conditional
    condition: "editing framework skills, contracts, evals, hooks, templates, or workflow patterns"
    description: "Local pattern retrieval record used before editing framework surfaces"
    validation: "Must name real searched pattern paths/queries, canonical pattern path used, counterexample/edge case path checked, or explicit no-pattern rationale; template placeholders do not satisfy this artifact"
    on_fail: "Search local repo for similar patterns and record the result before editing"
    object_fields:
      - name: similar_patterns_searched
        type: string[]
        required: true
      - name: canonical_pattern_used
        type: string
        required: true
      - name: counterexample_or_edge_case_checked
        type: string
        required: true
      - name: no_pattern_rationale
        type: string
        required: false

  - name: context_handoff_packet
    type: object
    required: conditional
    condition: "no task journal/equivalent carried-forward state exists, or explicit non-standard handoff is requested"
    description: "Compression-safe continuation packet following references/context-handoff-templates.md"
    validation: "Pinned context is separated from summarized/pruned context and exact next action is present"
    on_fail: "When no task journal/equivalent state exists or explicit non-standard handoff is requested, create a handoff packet with Active Task, Pinned Requirements, Work State, Verification, Context Hygiene, and Exact Next Action"
    object_fields:
      - name: active_task
        type: string
        required: true
      - name: pinned_requirements
        type: string
        required: true
      - name: work_state
        type: string
        required: true
      - name: verification
        type: string
        required: true
      - name: context_hygiene
        type: string
        required: true
      - name: exact_next_action
        type: string
        required: true


  - name: artifact_contract
    type: object
    required: conditional
    condition: "task proceeds beyond discovery into plan, build, or documentable deliverable"
    description: "Artifact-first deliverable contract that makes the user-visible output concrete before implementation"
    validation: "Must include artifact type, required files/deliverables, output format/schema, acceptance criteria, verification command/method, expected success signal, owner/consumer, and non-goals/exclusions"
    on_fail: "Load references/artifact-first-output-contract.md and define the Artifact Contract before Plan or Build"
    object_fields:
      - name: artifact_type
        type: enum
        enum_values: [code, docs, report, dataset, chart, slide_deck, plan, eval, PR, config, other]
        required: true
      - name: required_files_or_deliverables
        type: string[]
        required: true
      - name: output_format_schema
        type: string
        required: true
      - name: acceptance_criteria
        type: string[]
        required: true
      - name: verification_command_or_method
        type: string
        required: true
      - name: expected_success_signal
        type: string
        required: true
      - name: owner_consumer
        type: string
        required: true
      - name: non_goals_exclusions
        type: string[]
        required: true

  - name: decomposition_plan_review
    type: object
    required: conditional
    condition: "size in [medium, large, mega]"
    description: "Cheap-before-expensive review of slice/subagent decomposition before Plan/Build"
    validation: "Must state scope understanding, slice/subagent count sanity, step/cost budget, dependency order, output-plan match, fallback path, broad-split rejection proof, and proceed/revise/return decision"
    on_fail: "Load references/decomposition-plan-review.md and repair the decomposition review packet before entering Plan"
    object_fields:
      - name: scope_understanding
        type: string
        required: true
      - name: slice_subagent_count
        type: string
        required: true
      - name: step_cost_budget
        type: string
        required: true
      - name: dependency_order
        type: string
        required: true
      - name: output_plan_match
        type: string
        required: true
      - name: fallback_path
        type: string
        required: true
      - name: broad_split_rejection
        type: string
        required: true
        description: "Required proof that layer-only, module-only, folder-only, feature-only, setup-only, contract-only, and broad component-style splits were rejected unless they are verified deliverable artifact slices"
      - name: decision
        type: enum
        enum_values: [proceed, revise_decomposition, return_to_discover]
        required: true

  - name: slice_manifest
    type: object[]
    required: true
    condition: "size in [medium, large, mega]"
    validation: >
      Contains one or more smallest iterable slices in dependency order. Each
      slice has the strict slice schema, exact files, observable increment,
      acceptance criteria, verification command, expected success signal, and
      deviation rollback rule. slice_id values are unique branch/path-safe
      identifiers, and depends_on entries reference only declared slice_id values
      without self dependencies or circular dependencies.
      Layer-only, module-only, folder-only, feature-only, setup-only,
      contract-only, or broad component-style splits are invalid unless the work
      is a verified deliverable artifact slice.
    on_fail: "Return to DECOMPOSE/PLAN and produce a strict slice manifest; reject broad layer/module/folder/feature/component splits and setup-only or contract-only splits unless they are verified deliverable artifacts; include a single-slice rationale when only one slice is correct"
    min_items: 1
    object_fields:
      - name: slice_id
        type: string
        required: true
        description: "Unique branch/path-safe slice identifier reused for branches, worktrees, brief filenames, and depends_on references"
        validation: "Must be unique within slice_manifest; use only lowercase letters, digits, and hyphens; start and end with a letter or digit; no slashes, whitespace, path traversal, or branch separators"
      - name: name
        type: string
        required: true
      - name: observable_increment
        type: string
        required: true
      - name: deliverable_type
        type: enum
        required: true
        enum_values: [behavior, artifact, contract, docs, eval, config, migration, refactor]
      - name: acceptance_criteria
        type: string[]
        required: true
        min_items: 1
      - name: files_to_create
        type: string[]
        required: true
      - name: files_to_modify
        type: string[]
        required: true
      - name: files_to_test
        type: string[]
        required: true
      - name: enabling_changes_included
        type: string[]
        required: true
      - name: depends_on
        type: string[]
        required: true
        description: "Declared prerequisite slice IDs that must be VERIFIED before this slice starts"
        validation: "Every dependency is the slice_id of another declared slice in this manifest; no self dependency or circular dependency is allowed; use an empty array when there are no dependencies"
      - name: verification_command
        type: string
        required: true
      - name: expected_success_signal
        type: string
        required: true
      - name: evidence_to_record
        type: string[]
        required: true
        min_items: 1
      - name: deviation_rollback_rule
        type: string
        required: true

  - name: single_slice_rationale
    type: string
    required: conditional
    condition: "size in [medium, large, mega] and slice_manifest has exactly one item"
    description: "Required when medium+ emits one slice; proves the one slice is the smallest iterable decomposition and not a broad fallback."
    validation: "single_slice_rationale must be present and non-blank, explaining why the task cannot be split into smaller independently verifiable slices without losing the observable increment"
    on_fail: "Return to DECOMPOSE/PLAN and either split the work into multiple strict slices or provide a non-blank single_slice_rationale"

  - name: slice_verification_summary
    type: object[]
    required: true
    condition: "size in [medium, large, mega]"
    validation: >
      Contains one entry per slice from the manifest, in order, with task
      packet id, RED status when TDD was active, implementation status,
      verification command/result, acceptance criteria checked, self-check
      result, and final status. Every slice final status must be VERIFIED before
      WORKFLOW COMPLETE.
    on_fail: "Run and record per-slice verification evidence until every slice final_status is VERIFIED"
    object_fields:
      - name: slice_id
        type: string
        required: true
      - name: slice_name
        type: string
        required: true
      - name: task_packet_id
        type: string
        required: true
      - name: red_status
        type: string
        required: true
        validation: "Use pass/fail when TDD was active, otherwise N/A"
      - name: implementation_status
        type: enum
        required: true
        enum_values: [done, blocked]
      - name: verification_result
        type: string
        required: true
        validation: "Command or inspection performed plus pass/fail result and success signal"
      - name: criteria_checked
        type: string
        required: true
        validation: "All slice acceptance criteria listed with pass/fail status"
      - name: self_check_result
        type: string
        required: true
        validation: "Local sanity check result against task packet, constraints, and deviation rule"
      - name: final_status
        type: enum
        required: true
        enum_values: [VERIFIED]

  - name: metrics_entry
    type: jsonl_line
    required: conditional
    condition: "local metrics are configured and policy allows persistent workflow metrics"
    validation: "Valid JSON with required keys: date, project, task, size, review_rounds, plan_deviations, build_failures"
    on_fail: "Append valid metrics when configured and policy-allowed, or record metrics unavailable/disallowed in final output"
    location: "{agent_metrics_path}/workflow-metrics.jsonl"

  - name: candidate_search_result
    type: object
    required: conditional
    condition: "search_mode == candidate_search"
    description: "BES-style candidate-search result used before committing to a plan or when an approved plan needs a candidate pivot"
    validation: "Contains goal_tree, candidate_archive, scoring_rubric, selected_candidate, selection_reason, search_exit_summary, and plan_deviation when the selected candidate changes an approved plan."
    on_fail: "Load references/candidate-search.md, reconstruct the archive from criteria/options considered, score candidates, and re-approve any post-approval plan deviation before Build continues"
    object_fields:
      - name: goal_tree
        type: string
        required: true
        validation: "Decomposes existing acceptance criteria or slice acceptance/verification criteria; does not invent unrelated success criteria"
      - name: candidate_archive
        type: object[]
        required: true
        validation: "At least two candidates unless a single feasible path is explicitly justified"
        object_fields:
          - name: id
            type: string
            required: true
          - name: summary
            type: string
            required: true
          - name: lineage
            type: string
            required: true
            validation: "Origin and operator such as seed, mutate, rewrite, combine, translocate, delete, or repair"
          - name: scores
            type: string
            required: true
            validation: "Objective fit, verifiability, feasibility, risk, and simplicity scores or rationale"
      - name: selected_candidate
        type: string
        required: true
        validation: "References one candidate id from candidate_archive"
      - name: scoring_rubric
        type: string
        required: true
        validation: "Names the pre-code rubric dimensions used to score candidates: objective fit, verifiability, feasibility, risk, and simplicity"
      - name: selection_reason
        type: string
        required: true
        validation: "Explains why this candidate best satisfies the pre-code rubric"
      - name: archive_location
        type: string
        required: true
        validation: "{agent_state_dir}/candidate-search.md when local state artifacts are configured and policy-allowed; otherwise inline in the plan/task packet"
      - name: search_exit_summary
        type: object
        required: true
        validation: "Records the candidate-search budget and why search stopped; prevents unbounded option loops and success claims after empty or exhausted search"
        object_fields:
          - name: max_candidates
            type: int
            required: true
            description: "Candidate budget chosen before search or the documented cap for this run"
          - name: candidates_considered
            type: int
            required: true
            description: "Number of candidates actually evaluated, including rejected candidates"
          - name: repair_iterations
            type: int
            required: false
            description: "Number of mutate/repair/pivot iterations used after initial candidates"
            default: 0
          - name: exit_reason
            type: enum
            required: true
            enum_values: [selected, single_path_justified, max_budget, blocked, plan_deviation_pending_approval]
            description: "Why candidate search stopped"
          - name: empty_result_handling
            type: string
            required: true
            description: "What happened if no viable candidate was found, or why this was not applicable"
      - name: plan_deviation
        type: string
        required: false
        condition: "candidate search occurred after plan approval or selected candidate changes approved scope/files/behavior/risk"
        validation: "Records deviation, impact, rollback/re-approval status, and user approval when required"

  - name: plan_document
    type: string
    required: conditional
    condition: "size in [medium, large, mega] or hook_profile == strict; small work may use the inline plan in final response"
    validation: >
      Small: inline plan with goal, files, risks, tests.
      Medium: standard plan per plan-template.md.
      Large/Mega: full plan per plan-template.md including Security and Operability.
    on_fail: "Write or update the plan document for the task size before proceeding"

  - name: user_approval
    type: enum
    required: conditional
    condition: "size in [medium, large, mega] or risk/ambiguity requires approval; small low-risk work may use not_required_small"
    enum_values: [confirmed, confirmed_with_issues, not_required_small]
    validation: "Medium+ tasks require explicit confirmation before Document. Small tasks may use not_required_small only when the inline plan proceeded without risk/ambiguity requiring approval."
    on_fail: "Obtain user approval or justify not_required_small eligibility before completion"

# Completeness check:
# Before printing --- WORKFLOW COMPLETE ---, verify:
# 1. All required artifacts for the task's completion_tier are present
# 2. test_results.failed == 0 when tests ran; validation_results contains at least one result=passed entry for completed implementation workflows. Skipped/not_applicable entries do not satisfy completion evidence; docs-only/no-op/discovery exceptions must record the reason.
# 3. When size is medium/large/mega, risk_tier is high/critical, or hook_profile == strict: spec_review_result.status == PASS and required_fixes are empty or resolved
# 4. When size is medium/large/mega, risk_tier is high/critical, or hook_profile == strict: review_result.quality_review_status is not missing
# 5. For medium+ tasks, slice_verification_summary has one VERIFIED entry per slice
# 6. candidate_search_result exists when search_mode == candidate_search, includes search_exit_summary, and any plan_deviation is approved before Build
# 7. user_approval is confirmed, confirmed_with_issues, or not_required_small for eligible small tasks
# If any check fails, do NOT print --- WORKFLOW COMPLETE ---. State what is missing.
  - name: verified_skill_distillation
    type: object
    required: conditional
    condition: "workflow produced a repeatable process, recurring lesson, user-requested reusable procedure, or skill/constraint candidate"
    description: "Verifier-approved promotion packet for turning a successful workflow or review lesson into a reusable skill or constraint"
    validation: "Must include candidate workflow, inputs, process steps, output artifact, verification gate, learned constraints, scope/non-goals, evidence, verifier result, and promotion decision"
    on_fail: "Load references/verified-skill-distillation.md; create the packet; send it to an independent verifier before saving any skill or constraint"
    object_fields:
      - name: candidate_workflow
        type: string
        required: true
      - name: inputs
        type: string[]
        required: true
      - name: process_steps
        type: string[]
        required: true
      - name: output_artifact
        type: string
        required: true
      - name: verification_gate
        type: string
        required: true
      - name: learned_constraints
        type: string[]
        required: true
      - name: scope_and_non_goals
        type: string
        required: true
      - name: evidence_from_current_run
        type: string
        required: true
      - name: verifier_result
        type: enum
        enum_values: [approved, rejected, needs_revision]
        required: true
      - name: promotion_decision
        type: enum
        enum_values: [create_skill, update_skill, add_constraint, skip]
        required: true

# Workflow Input Contract
# All agents (Claude, Codex, Gemini) MUST resolve these fields before entering Triage.
# Fields are extracted from the user's request. If a required field cannot be inferred,
# follow the on_missing action.

schema_version: "1.0"
contract: input
skill: assistant-workflow

fields:
  - name: task_description
    type: string
    required: true
    description: "What to build, fix, refactor, or investigate"
    validation: "Non-empty string. Must describe a concrete action or desired outcome."
    on_missing: ask
    ask_prompt: "What would you like me to build, fix, or change?"

  - name: task_type
    type: enum
    required: true
    enum_values: [feature, bugfix, refactor, migration, rewrite, config, infra, security, docs, spike]
    description: "Category of work — drives which task-category gate packs and prompt packs load"
    validation: "Must be one of the enum values"
    on_missing: infer
    infer_from: "task_description keywords: 'fix/bug/broken' -> bugfix, 'rewrite/port' -> rewrite, 'migrate/migration' -> migration, 'refactor/clean/reorganize' -> refactor, 'config/setting/env' -> config, 'infra/deploy/hook/install' -> infra, 'security/auth/PII/payment/input validation' -> security, 'docs/readme/document/changelog' -> docs, 'spike/explore/investigate' -> spike, else -> feature"

  - name: risk_tier
    type: enum
    required: false
    enum_values: [low, moderate, high, critical]
    description: "Triage risk tier inferred during Triage from impact, uncertainty, reversibility, and affected boundaries"
    validation: "Must be one of the enum values when present"
    default: null
    on_missing: skip
    infer_from: "Use references/triage-rubric.md during Triage. Escalate for public contracts, data, auth, PII, payments, irreversible changes, weak tests, or behavior-preserving legacy work."

  - name: required_gates
    type: string[]
    required: false
    description: "Gate names selected during Triage from the common gates and task-category gate packs"
    validation: "Each entry is a short gate label from references/triage-rubric.md or a clearly justified project-specific gate"
    default: []
    on_missing: skip

  - name: required_agents
    type: string[]
    required: false
    description: "Agent or skill roles required by size, task type, and risk tier"
    validation: "Entries must be known workflow roles or installed skills, or state a clear project-specific role. Any development/code-work task that will change project source, tests, docs, config, hooks, contracts, or generated project artifacts must include at minimum Code Writer, Builder/Tester, and Reviewer responsibilities."
    default: []
    on_missing: skip

  - name: subagent_policy_state
    type: enum
    required: false
    enum_values: [not_required, authorization_required, delegation_authorized, authorization_denied, subagents_unavailable, policy_disallowed]
    description: "Whether subagent spawning is allowed for this task under the active adapter and user/tool policy"
    validation: "Must describe the current authorization or availability state before any subagent dispatch occurs"
    default: not_required
    on_missing: infer
    infer_from: "Use authorization_required when the active tool policy requires explicit user permission before spawning subagents; use delegation_authorized after explicit user approval; use authorization_denied when the user declines; use subagents_unavailable when the adapter has no subagent mechanism; use policy_disallowed when policy forbids spawning; use not_required when the workflow phase does not need subagents."

  - name: subagent_execution_mode
    type: enum
    required: false
    enum_values: [delegated, direct_fallback, not_applicable]
    description: "How role responsibilities will be executed for this task"
    validation: "delegated requires subagent_policy_state=delegation_authorized or not_required in an adapter that permits subagents; direct_fallback requires authorization_denied, subagents_unavailable, or policy_disallowed and equivalent evidence; not_applicable applies when no subagent role is required"
    default: not_applicable
    on_missing: infer
    infer_from: "If required_agents is empty and no project source/test/docs/config artifact will change, use not_applicable. If the task will change project source, tests, docs, config, hooks, contracts, or generated project artifacts, not_applicable is invalid for Build; use delegated when subagent_policy_state is delegation_authorized or not_required in an adapter that permits subagents. If authorization is required but not granted, authorization is denied, subagents are unavailable, or policy disallows spawning, use direct_fallback with explicit fallback reason and equivalent evidence."

  - name: subagent_authorization_scope
    type: string[]
    required: false
    description: "Roles, phases, or actions covered by explicit user authorization for subagent spawning"
    validation: "Empty when no authorization was needed or granted. Non-empty when subagent_policy_state=delegation_authorized."
    default: []
    on_missing: skip

  - name: scope_hint
    type: enum
    required: false
    enum_values: [small, medium, large, mega]
    description: "User-provided size estimate. Triage may override."
    default: null
    on_missing: skip

  - name: target_files
    type: string[]
    required: false
    description: "Specific files the user wants changed"
    validation: "Each entry must be a valid relative file path"
    default: []
    on_missing: skip

  - name: constraints
    type: string[]
    required: false
    description: "Boundaries the agent must not cross"
    validation: "Each entry is a plain-language constraint. Constraints only accumulate — never remove without explicit user instruction."
    default: []
    on_missing: skip
    examples:
      - "Don't touch ProjectA"
      - "Stay on .NET 8"
      - "No new NuGet packages"
      - "Backend only, no UI"

  - name: tdd_mode
    type: boolean
    required: false
    description: "Whether to enforce Red-Green-Refactor cycle via assistant-tdd skill"
    default: false
    on_missing: skip
    infer_from: "User says 'TDD', 'tests first', 'red green refactor' -> true"

  - name: debugging_mode
    type: enum
    required: false
    enum_values: [not_applicable, root_cause_unknown, root_cause_known, completed, blocked]
    description: "Whether assistant-debugging must run before bugfix implementation/TDD"
    default: not_applicable
    on_missing: infer
    infer_from: "task_type == bugfix and cause is not already evidenced -> root_cause_unknown; task_type == bugfix with clear reproduction/root-cause evidence -> root_cause_known; non-bugfix -> not_applicable"
    validation: "Unknown-cause bugfixes must not proceed to implementation until debugging_mode is completed or blocked with evidence"

  - name: acceptance_criteria
    type: string[]
    required: false
    description: "Explicit success criteria from user or decomposed from an idea"
    validation: "Each criterion is atomic, binary (pass/fail), and testable (8-12 words)"
    default: []
    on_missing: skip
    notes: "Populated by Idea-to-Action pipeline when input is a vague idea rather than a concrete task"

  - name: search_mode
    type: enum
    required: false
    enum_values: [none, lightweight, candidate_search]
    description: "Whether planning should evaluate one obvious path, a lightweight options list, or a BES-style candidate search before committing to an approach. Allowed values: none, lightweight, candidate_search"
    validation: "Must be one of: none, lightweight, candidate_search. candidate_search triggers only for explicit alternatives, open-ended architecture/design, optimization, high uncertainty, repeated failed attempts, unclear/flaky bugs, or reviewer-requested pivots."
    default: none
    on_missing: infer
    infer_from: "Use candidate_search for explicit alternatives, open-ended architecture/design, optimization-heavy work, high uncertainty, repeated failed attempts, unclear/flaky bugs, or reviewer-requested pivots; use lightweight for ordinary tasks with 1-3 obvious options; otherwise none."

  - name: candidate_search_goal
    type: string
    required: false
    description: "Single objective used to decompose the goal tree when search_mode=candidate_search"
    validation: "Derived from acceptance criteria and slice acceptance/verification criteria; must not create a second source of truth."
    default: null
    on_missing: skip

  - name: candidate_search_constraints
    type: string[]
    required: false
    description: "Constraints and non-goals that every candidate must satisfy"
    validation: "Each entry must come from user constraints, approved plan boundaries, policy constraints, or discovered project constraints."
    default: []
    on_missing: skip

  - name: clarification_status
    type: enum
    required: true
    enum_values: [ready, needs_clarification]
    description: "Whether Discover is clear to continue or is waiting on explicit clarification about implementation-shaping fields"
    validation: "ready requires zero unresolved clarification topics and every implementation-shaping field is explicit or defaulted. needs_clarification requires at least one unresolved clarification topic."
    on_missing: infer
    infer_from: "If any implementation-shaping field that affects files, behavior, interfaces, data shape, rollout, or verification is still unresolved, set to needs_clarification and add a deterministic topic label. Set to ready only when each such field is explicit or has an explicit default."

  - name: clarification_confidence
    type: enum
    required: false
    enum_values: [low, medium, high]
    description: "Confidence that prompt plus discovered code/context is sufficient to plan safely"
    validation: "high means no blocking implementation-shaping ambiguity remains. low requires needs_clarification unless the task is explicitly read-only."
    default: medium
    on_missing: skip

  - name: clarification_questions_asked
    type: int
    required: false
    description: "Number of clarification questions asked during Discover"
    validation: "Must be zero or greater. May be zero for any task size when prompt plus code/context are sufficiently clear."
    default: 0
    on_missing: skip

  - name: clarification_question_cap
    type: int
    required: false
    description: "Maximum allowed clarification questions for the current size/risk, never a quota"
    validation: "Must be zero or greater. The cap limits questions; it never requires questions."
    default: 0
    on_missing: skip

  - name: clarification_admissibility
    type: enum
    required: false
    enum_values: [satisfied, needs_clarification, not_applicable]
    description: "Whether any asked clarification questions pass the admissibility test"
    validation: "satisfied means every asked question affects correctness/scope/behavior/security/verification, cannot be discovered from code/context, lacks a safe default, and states risk if guessed."
    default: not_applicable
    on_missing: skip

  - name: unresolved_clarification_topics
    type: string[]
    required: true
    description: "Deterministic short labels for unanswered topics that block planning"
    validation: "List every unresolved implementation-shaping field with one deterministic short label. Empty when clarification_status=ready. Non-empty when clarification_status=needs_clarification."
    default: []
    on_missing: skip
    examples:
      - "target subsystem"
      - "default behavior"
      - "migration strategy"

  - name: clarification_defaults_applied
    type: boolean
    required: true
    description: "Whether any unresolved clarification topic was resolved by an explicit `defaults` reply during Discover"
    validation: "Must be explicit true or false. May be true only after the workflow prints the applied defaults and the user explicitly replies `defaults`."
    default: false
    on_missing: skip
    notes: "Never infer this from follow-up wording or continuation text."

# Validation behavior:
# 1. Resolve all required fields BEFORE printing --- PHASE: TRIAGE ---
# 2. If on_missing=ask: present ONE focused question, wait for answer
# 3. If on_missing=infer: state the inference ("I'm treating this as a feature task")
# 4. If on_missing=skip: proceed with default value
# 5. Clarification question caps are maximums, not quotas. Never ask a ritual question just because a task is medium+.
# 6. If clarification_status=needs_clarification: carry unresolved_clarification_topics into Discover and stop for explicit answers or `defaults`
# 7. Log resolved input as: >> Input: {task_type} | scope: {scope_hint or "auto"} | constraints: {count}

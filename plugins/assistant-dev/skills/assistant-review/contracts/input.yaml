# Review Input Contract
# Resolve these fields before entering the review loop.
# The agent determines scope from user request context, git state, or task journal.

schema_version: "1.0"
contract: input
skill: assistant-review

fields:
  - name: review_scope
    type: enum
    required: true
    enum_values: [files, changes, task, pr, content]
    description: "What to review — specific files, uncommitted changes, task journal changes, a PR, or pasted/provided content"
    on_missing: infer
    infer_from: >
      User specified files → files.
      User provided pasted content or an arbitrary text/file snapshot → content.
      Uncommitted changes exist (git diff non-empty) → changes.
      Active configured task journal, agent-state task file ({agent_state_dir}/task.md), or carried-forward task packet exists → task.
      User provided PR number/URL → pr.
      None of the above → ask.

  - name: review_material_snapshot
    type: object
    required: true
    description: "The material available to review, captured as a scope snapshot rather than assuming a diff"
    validation: "Non-empty. Must include enough material to support concrete file/content findings."
    on_missing: fail
    notes: "Generated from review_scope: git diff for changes, file contents for files, task/PR snapshot, or user-provided content."
    object_fields:
      - name: kind
        type: enum
        required: true
        enum_values: [diff, files, task_snapshot, pr_snapshot, content]
        description: "Shape of the review material"
      - name: summary
        type: string
        required: true
        description: "Concise description of what the snapshot covers"
      - name: material
        type: string
        required: true
        description: "Actual diff, file contents/excerpts, task or PR snapshot, or pasted content"
      - name: files
        type: string[]
        required: false
        default: []
        description: "Known files covered by the snapshot"
      - name: source_ref
        type: string
        required: false
        default: null
        description: "Optional PR URL, task journal path, command, or user-provided label"

  - name: scope_size
    type: enum
    required: true
    enum_values: [trivial, small, medium, large]
    description: "Size of the review scope — determines review rigor and whether delegated review is expected when authorized"
    on_missing: infer
    infer_from: >
      1-2 files, < 50 lines changed → trivial.
      1-3 files, < 200 lines changed → small.
      4-10 files, < 500 lines changed → medium.
      10+ files or 500+ lines → large.

  - name: subagent_policy_state
    type: enum
    required: false
    enum_values: [not_required, authorization_required, delegation_authorized, authorization_denied, subagents_unavailable, policy_disallowed]
    description: "Whether Reviewer subagent spawning is allowed under the active adapter and user/tool policy"
    validation: "Must be resolved before dispatching a Reviewer subagent"
    default: not_required
    on_missing: infer
    infer_from: "Use authorization_required when the active tool policy requires explicit user permission before spawning reviewer subagents; use delegation_authorized after explicit user approval; use authorization_denied when the user declines; use subagents_unavailable when the adapter has no subagent mechanism; use policy_disallowed when policy forbids spawning; use not_required for trivial/small self-review paths."

  - name: subagent_execution_mode
    type: enum
    required: false
    enum_values: [delegated, direct_fallback, not_applicable]
    description: "How Reviewer responsibility is executed"
    validation: "delegated requires authorization or a policy that permits subagents; direct_fallback requires fresh review context evidence without spawning; not_applicable applies to trivial/small self-review"
    default: not_applicable
    on_missing: infer
    infer_from: "For medium+ scope use delegated when Reviewer subagents are authorized and available. Use direct_fallback when authorization is denied, subagents are unavailable, or policy disallows spawning. Use not_applicable for trivial/small self-review."

  - name: subagent_authorization_scope
    type: string[]
    required: false
    description: "Review rounds, roles, or files covered by explicit user authorization for Reviewer subagent spawning"
    validation: "Empty unless explicit authorization was granted. Non-empty when subagent_policy_state=delegation_authorized."
    default: []
    on_missing: skip

  - name: qa_evaluation_mode
    type: enum
    required: false
    enum_values: [not_required, optional, required]
    description: "Whether the independent QA evaluation loop should run after code-review/build evidence"
    validation: "required for medium+ harness-capable, domain-scored, UI/visual/product/UX/docs/DX-facing, or explicitly requested QA work; not_required must have a reason in final output when skipped for medium+ harness work"
    default: not_required
    on_missing: infer
    infer_from: >
      Use required when the task is medium+ harness-capable, has a Done Contract, is domain-scored,
      affects UI/visual/product/UX/docs/DX quality, or the user explicitly requests QA/acceptance evaluation.
      Use optional when acceptance material exists but the orchestrator has not marked QA as required.
      Use not_required for trivial/small code-review-only work with no separate acceptance evidence need.

  - name: done_contract
    type: object
    required: conditional
    condition: "qa_evaluation_mode == required and Done Contract exists for the task"
    description: "Accepted Done Contract used by QAEvaluator"
    validation: "When present, includes done_when, not_done_when, verification, owner_consumer, acceptance_criteria, debate_record with at least two perspectives, and accepted_by"
    on_missing: fail
    object_fields:
      - name: done_when
        type: string[]
        required: true
      - name: not_done_when
        type: string[]
        required: true
      - name: verification
        type: string[]
        required: true
      - name: owner_consumer
        type: string
        required: true
      - name: acceptance_criteria
        type: string[]
        required: true
      - name: debate_record
        type: object[]
        required: true
        min_items: 2
        description: "pre-build debate/subagent-perspective evidence considered before accepting the Done Contract"
        validation: "At least two perspectives; delegated mode uses subagent perspectives when available"
        object_fields:
          - name: perspective
            type: string
            required: true
          - name: concern_or_support
            type: string
            required: true
          - name: resolution
            type: string
            required: true
      - name: accepted_by
        type: string
        required: true

  - name: acceptance_criteria
    type: string[]
    required: conditional
    condition: "qa_evaluation_mode == required"
    description: "Binary acceptance criteria from the user request, approved plan, slice manifest, or Done Contract"
    validation: "At least one criterion is present and each criterion is independently evaluable"
    min_items: 1
    on_missing: fail

  - name: verification_evidence
    type: object[]
    required: conditional
    condition: "qa_evaluation_mode == required"
    description: "Build, test, manual, review, or inspection evidence QAEvaluator uses to verify acceptance"
    validation: "At least one evidence entry exists and each entry names the check/result and what it proves"
    min_items: 1
    on_missing: fail
    object_fields:
      - name: source
        type: string
        required: true
      - name: result
        type: string
        required: true
      - name: proves
        type: string
        required: true

  - name: domain_context
    type: object
    required: false
    description: "Scoped product, UX, docs, DX, or domain notes for QA evaluation"
    default: null
    on_missing: skip
    notes: "When populated, QAEvaluator may load references/domain-rubrics.md and select only matching rubric families."
    object_fields:
      - name: summary
        type: string
        required: true
      - name: in_scope_surfaces
        type: string[]
        required: true

  - name: rubric_refs
    type: string[]
    required: false
    description: "Explicit product/UX/docs/DX/UI/domain rubric family references used by QAEvaluator"
    default: []
    on_missing: skip
    notes: "Valid families are defined in references/domain-rubrics.md. Empty means no domain rubric is selected unless acceptance criteria or Done Contract scope requires one."

  - name: qa_filter_policy
    type: string
    required: conditional
    condition: "qa_evaluation_mode == required"
    description: "Evidence filter QAEvaluator must apply to acceptance findings"
    validation: "States that QA findings require acceptance criteria, Done Contract, verification evidence, scoped domain-context support, and debate_record when Done Contract exists; speculative concerns are non-blocking; round 10 is terminal"
    on_missing: infer
    infer_from: "Use the standard QA filter policy from references/qa-evaluation-loop.md."

  - name: mode
    type: enum
    required: true
    enum_values: [review-fix, audit]
    description: "review-fix: autonomous loop that fixes issues. audit: report only, no fixes."
    default: review-fix
    on_missing: infer
    infer_from: "User says 'audit', 'review only', 'just review', 'don't fix', 'provide findings', 'report findings', 'list findings', 'summarize findings', or 'review against' → audit. Otherwise → review-fix."

  - name: change_kind
    type: enum
    required: true
    enum_values: [code, docs, skill_or_workflow, config, mixed]
    description: "Dominant kind of material under review; skill_or_workflow triggers semantic contract review"
    on_missing: infer
    infer_from: >
      Changes under skills/, plugins/*/skills/, contracts/, evals/, prompts, hooks that inject workflow behavior,
      generated instruction templates, agent-framework docs, or named-method adaptations → skill_or_workflow.
      Application source changes → code. Documentation-only changes → docs. Config-only changes → config.
      Multiple categories → mixed.

  - name: semantic_contract_review_required
    type: boolean
    required: true
    description: "Whether to apply the Semantic Contract Review Checklist"
    on_missing: infer
    infer_from: "true when change_kind is skill_or_workflow or mixed with skill/workflow surfaces; otherwise false unless user requests semantic/contract review"

  - name: behavioral_contract_review_required
    type: boolean
    required: true
    description: "Whether to apply the Behavioral Contract Review Checklist for behavior-bearing code changes"
    on_missing: infer
    infer_from: >
      true when change_kind is code or mixed and the reviewed material touches public APIs, domain/business logic,
      persistence/migrations, auth/permissions, money/payments/trading, config/feature flags, external protocols/SDKs,
      algorithms, infrastructure/deployment, generated schemas/clients, or other behavior-bearing surfaces.
      false for docs-only/config-only changes that cannot affect runtime behavior unless the user requests behavioral review.

  - name: agentic_loop_safety_review_required
    type: boolean
    required: true
    description: "Whether to apply the Agentic Loop Safety Checklist"
    on_missing: infer
    infer_from: >
      true when reviewed material adds or changes agent loops, workflow loops, retry loops, research/search loops,
      tool-calling loops, multi-agent orchestration, background jobs, subagent dispatch loops, or repeated model/API calls.
      false when no autonomous/repeated execution path is present unless the user requests loop-safety review.

  - name: task_journal_path
    type: string
    required: false
    description: "Path to active task journal, if one exists"
    default: null
    validation: "File exists at the specified path"
    notes: "When present, review findings are appended to the journal's Review Log"

  - name: previously_fixed
    type: object[]
    required: false
    description: "Items already fixed in prior review loops (carries over from workflow Build/Review)"
    default: []
    object_fields:
      - name: description
        type: string
        required: true
      - name: fixed_in_round
        type: int
        required: true
        validation: ">= 1 and <= 10"

# Validation behavior:
# 1. Resolve review_scope, review_material_snapshot, change_kind, semantic_contract_review_required, behavioral_contract_review_required, and agentic_loop_safety_review_required before entering the loop
# 2. If review_material_snapshot.material is empty after resolution, inform user "nothing to review" and exit
# 3. If qa_evaluation_mode=required: require acceptance_criteria, verification_evidence, qa_filter_policy, and Done Contract with debate_record when the task has one before QAEvaluator dispatch
# 4. Log resolved input as: >> Review scope: {scope_size} | mode: {mode} | kind: {change_kind} | subagent_mode: {subagent_execution_mode} | qa_evaluation_mode: {qa_evaluation_mode} | loop_safety_review: {agentic_loop_safety_review_required} | behavioral_contract_review: {behavioral_contract_review_required} | semantic_contract_review: {semantic_contract_review_required} | files: {count}

# Review Output Contract
# Defines what a completed review MUST produce before presenting results to the user.

schema_version: "1.0"
contract: output
skill: assistant-review

artifacts:
  - name: review_delegation_path
    type: object
    required: conditional
    condition: "scope_size in [medium, large] or subagent_execution_mode in [delegated, direct_fallback]"
    description: "How Reviewer responsibility was executed"
    validation: "States subagent policy state, execution mode, authorization scope, and whether review used a fresh Reviewer subagent or fresh direct-fallback context"
    on_fail: "Record delegated review or direct fallback before presenting results; do not imply Reviewer subagents were used when they were not authorized or available"
    object_fields:
      - name: subagent_policy_state
        type: enum
        required: true
        enum_values: [not_required, authorization_required, delegation_authorized, authorization_denied, subagents_unavailable, policy_disallowed]
      - name: subagent_execution_mode
        type: enum
        required: true
        enum_values: [delegated, direct_fallback, not_applicable]
      - name: subagent_authorization_scope
        type: string[]
        required: true
      - name: fresh_context_evidence
        type: string
        required: true
        validation: "Names the fresh Reviewer dispatch, or the direct-fallback context reset used to reduce stale review risk"

  - name: qa_evaluation_delegation_path
    type: object
    required: conditional
    condition: "qa_evaluation_mode == required"
    description: "How QAEvaluator responsibility was executed"
    validation: "States subagent policy state, execution mode, authorization scope, and whether QA used a fresh QAEvaluator subagent or fresh direct-fallback context"
    on_fail: "Record delegated QA evaluation or direct fallback before presenting results; do not imply QAEvaluator subagents were used when they were not authorized or available"
    object_fields:
      - name: subagent_policy_state
        type: enum
        required: true
        enum_values: [not_required, authorization_required, delegation_authorized, authorization_denied, subagents_unavailable, policy_disallowed]
      - name: subagent_execution_mode
        type: enum
        required: true
        enum_values: [delegated, direct_fallback, not_applicable]
      - name: subagent_authorization_scope
        type: string[]
        required: true
      - name: fresh_context_evidence
        type: string
        required: true
        validation: "Names the fresh QAEvaluator dispatch, or the direct-fallback context reset used to reduce stale QA risk"

  - name: pivot_restart_decision
    type: object
    required: conditional
    condition: "review or QA loop observes STAGNATION, repeated DRIFT, repeated REGRESSION, rubric action PIVOT, or scoped domain action pivot"
    description: "Orchestrator-owned decision packet created before another review/fix/QA/build dispatch after stagnant or pivot-triggered quality loops."
    validation: "Must include trigger, evidence, affected_slice_or_round, options_considered, selected_action, reapproval_required, next_agent, recovery_pointer, and exact_next_action. Reapproval is required when scope, files, behavior, risk, verification, or acceptance criteria change."
    on_fail: "Pause the loop and create the pivot_restart_decision before continuing; do not silently continue after stagnation or pivot."
    object_fields:
      - name: trigger
        type: enum
        required: true
        enum_values: [STAGNATION, repeated_DRIFT, repeated_REGRESSION, pivot]
      - name: evidence
        type: object[]
        required: true
        min_items: 1
        object_fields:
          - name: source
            type: string
            required: true
          - name: detail
            type: string
            required: true
      - name: affected_slice_or_round
        type: string
        required: true
      - name: options_considered
        type: object[]
        required: true
        min_items: 2
        object_fields:
          - name: option
            type: string
            required: true
          - name: tradeoff
            type: string
            required: true
          - name: disposition
            type: enum
            required: true
            enum_values: [selected, rejected, deferred]
      - name: selected_action
        type: enum
        required: true
        enum_values: [reset_context, return_to_build, dispatch_debugging, dispatch_explorer, dispatch_architect, run_candidate_search, replan, restart_slice, restart_phase, block_for_user, accept_with_limitations]
      - name: reapproval_required
        type: boolean
        required: true
      - name: next_agent
        type: string
        required: true
      - name: recovery_pointer
        type: string
        required: true
      - name: exact_next_action
        type: string
        required: true

  - name: review_finding_rule_distillation
    type: object[]
    required: conditional
    condition: "review has blocker or must-fix findings, or a finding exposes recurring process, contract, checklist, or eval gaps"
    description: "Classification of review findings into one-off fixes versus permanent rule candidates"
    validation: "Each applicable finding must include evidence, failure pattern, classification, target, proposed rule or no-action rationale, verification/eval update, scope/exclusions, and promotion decision"
    on_fail: "Load references/review-finding-permanent-rule.md and classify blocker/must-fix findings before final review output"
    object_fields:
      - name: finding
        type: string
        required: true
      - name: evidence
        type: string
        required: true
      - name: failure_pattern
        type: string
        required: true
      - name: classification
        type: enum
        enum_values: [one_off_fix, permanent_rule_candidate, no_action]
        required: true
      - name: rule_target
        type: enum
        enum_values: [checklist, input_contract, output_contract, phase_gate, handoff, eval, template, skill_reference, none]
        required: true
      - name: proposed_rule
        type: string
        required: true
      - name: verification_eval_update
        type: string
        required: true
      - name: scope_and_exclusions
        type: string
        required: true
      - name: promotion_decision
        type: enum
        enum_values: [promote, defer, reject]
        required: true

  - name: final_summary
    type: object
    required: true
    condition: always
    description: "The single summary presented to the user after the loop completes"
    validation: "Must include rounds (1-20), result, fixed_items, remaining_items when applicable, and nits before presenting review results"
    object_fields:
      - name: rounds
        type: int
        required: true
        validation: ">= 1 and <= 20"
      - name: result
        type: enum
        required: true
        enum_values: [CLEAN, ISSUES_FIXED, HAS_REMAINING_ITEMS]
      - name: fixed_items
        type: object[]
        required: true
        description: "All items fixed across all rounds, grouped by severity"
        object_fields:
          - name: severity
            type: enum
            required: true
            enum_values: [must-fix, should-fix, nit]
          - name: file
            type: string
            required: true
          - name: description
            type: string
            required: true
          - name: fixed_in_round
            type: int
            required: true
            validation: ">= 1 and <= 20"
      - name: remaining_items
        type: object[]
        required: false
        condition: "result == HAS_REMAINING_ITEMS"
        description: "Items that could not be resolved within max rounds"
        object_fields:
          - name: severity
            type: enum
            required: true
            enum_values: [must-fix, should-fix]
          - name: file
            type: string
            required: true
          - name: description
            type: string
            required: true
          - name: reason_unresolved
            type: string
            required: true
      - name: nits
        type: object[]
        required: true
        description: "Low-priority observations noted but not fixed"
        object_fields:
          - name: file
            type: string
            required: true
          - name: description
            type: string
            required: true

  - name: qa_evaluation_result
    type: object
    required: conditional
    condition: "qa_evaluation_mode == required"
    description: "Independent QA evaluation final result after build/test and code-review evidence"
    validation: "Must include rounds (1-20), final_verdict, result, acceptance_findings, qa_scorecard, selected_domain_rubrics/domain_quality_scores when scoped domain rubrics were used, score_progression, evidence, and open_questions when blocked"
    on_fail: "Run the QA evaluation loop from references/qa-evaluation-loop.md or record why QA is blocked before presenting final review results"
    object_fields:
      - name: rounds
        type: int
        required: true
        validation: ">= 1 and <= 20"
      - name: final_verdict
        type: enum
        required: true
        enum_values: [accepted, accepted_with_concerns, rejected, blocked]
      - name: result
        type: enum
        required: true
        enum_values: [CLEAN, ISSUES_FIXED, HAS_REMAINING_ITEMS, BLOCKED]
      - name: acceptance_findings
        type: object[]
        required: true
        description: "Remaining or resolved acceptance findings from the final QA round"
        object_fields:
          - name: severity
            type: enum
            required: true
            enum_values: [blocker, concern, observation]
          - name: criterion
            type: string
            required: true
          - name: evidence
            type: string
            required: true
          - name: disposition
            type: enum
            required: true
            enum_values: [resolved, remaining, not_applicable]
      - name: qa_scorecard
        type: object
        required: true
        description: "Compact QA scorecard; domain_quality is backed by selected_domain_rubrics/domain_quality_scores only when scoped domain rubrics were used"
        object_fields:
          - name: acceptance_coverage
            type: float
            required: true
          - name: evidence_strength
            type: float
            required: true
          - name: domain_quality
            type: float
            required: true
          - name: final_readiness
            type: float
            required: true
          - name: weighted_score
            type: float
            required: true
      - name: selected_domain_rubrics
        type: string[]
        required: false
        condition: "domain_context or rubric_refs was provided, or acceptance criteria / Done Contract required subjective/product/UX/docs/DX/UI/domain craft evaluation"
        description: "Rubric families selected from references/domain-rubrics.md; empty or omitted when domain rubrics were not scoped"
      - name: domain_quality_scores
        type: object[]
        required: false
        condition: "selected_domain_rubrics is non-empty"
        description: "Evidence-backed domain rubric scores from the final QA round"
        object_fields:
          - name: rubric_ref
            type: string
            required: true
          - name: dimension
            type: string
            required: true
          - name: score
            type: float
            required: true
          - name: action
            type: enum
            required: true
            enum_values: [accepted, accepted_with_concerns, refine, rejected, pivot, not_applicable]
          - name: evidence
            type: string
            required: true
      - name: score_progression
        type: object[]
        required: true
        description: "QA score progression across rounds"
        object_fields:
          - name: round
            type: int
            required: true
            validation: ">= 1 and <= 20"
          - name: weighted_score
            type: float
            required: true
          - name: failed_acceptance_count
            type: int
            required: true
          - name: drift_status
            type: enum
            required: true
            enum_values: [GENUINE, SUSPICIOUS, DRIFT, REGRESSION, STAGNATION, NEUTRAL, NOT_APPLICABLE]
      - name: evidence
        type: object[]
        required: true
        min_items: 1
        object_fields:
          - name: source
            type: string
            required: true
          - name: detail
            type: string
            required: true
      - name: open_questions
        type: string[]
        required: false
        condition: "final_verdict == blocked or result == BLOCKED"
        description: "Questions or blocker details the orchestrator must resolve"

  - name: rubric_summary
    type: object
    required: false
    condition: "scope_size in [medium, large] and mode == review-fix"
    description: "Final rubric scores from the last review round, plus progression across all rounds"
    object_fields:
      - name: final_scores
        type: object
        required: true
        description: "Rubric scores from the final review round"
        object_fields:
          - name: correctness
            type: float
            required: true
          - name: code_quality
            type: float
            required: true
          - name: architecture
            type: float
            required: true
          - name: security
            type: float
            required: true
          - name: test_coverage
            type: float
            required: true
          - name: weighted_score
            type: float
            required: true
          - name: action
            type: enum
            required: true
            enum_values: [PASS, REFINE, PIVOT]
      - name: score_progression
        type: object[]
        required: true
        description: "Weighted score per round — used for drift detection and capped at the 20-round review limit"
        object_fields:
          - name: round
            type: int
            required: true
            validation: ">= 1 and <= 20"
          - name: weighted_score
            type: float
            required: true
          - name: finding_count
            type: int
            required: true
            description: "Total findings (must-fix + should-fix) this round"
          - name: drift_status
            type: enum
            required: true
            enum_values: [GENUINE, SUSPICIOUS, DRIFT, REGRESSION, STAGNATION, NEUTRAL]
            description: "Whether score change correlates with finding count change"

  - name: agentic_loop_safety_review
    type: object
    required: conditional
    condition: "agentic_loop_safety_review_required is true"
    description: "Review of runaway-loop and repeated-tool-call safety risks"
    validation: "Must state whether bounded execution, stop condition, retry/empty handling, tool-error handling, progress/stagnation detection, cost/token guardrails, and low-confidence escalation were checked"
    object_fields:
      - name: bounded_execution
        type: string
        required: true
      - name: stop_condition
        type: string
        required: true
      - name: retry_and_empty_result_handling
        type: string
        required: true
      - name: tool_error_handling
        type: string
        required: true
      - name: progress_and_stagnation_detection
        type: string
        required: true
      - name: cost_token_guardrails
        type: string
        required: true
      - name: low_confidence_escalation
        type: string
        required: true
      - name: loop_safety_findings_summary
        type: string
        required: true

  - name: behavioral_contract_review
    type: object
    required: conditional
    condition: "behavioral_contract_review_required is true"
    description: "Review of behavioral compatibility risks for code changes"
    validation: "Must state whether existing invariants, interface alignment, inherited test coverage, protocol/algorithm fidelity, high-impact guards, and runtime surfaces were checked"
    object_fields:
      - name: existing_behavior_and_invariants
        type: string
        required: true
      - name: interface_implementation_alignment
        type: string
        required: true
      - name: test_inheritance_coverage
        type: string
        required: true
      - name: protocol_algorithm_fidelity
        type: string
        required: true
      - name: high_impact_operation_guards
        type: string
        required: true
      - name: runtime_surface_sync
        type: string
        required: true
      - name: behavioral_findings_summary
        type: string
        required: true

  - name: semantic_contract_review
    type: object
    required: conditional
    condition: "semantic_contract_review_required is true"
    description: "Review of semantic contract risks for skill/workflow/framework changes"
    validation: "Must state whether inherited contracts, template-contract alignment, eval inheritance, external-method signature fidelity, high-stakes guards, and mirror surfaces were checked"
    object_fields:
      - name: inherited_contract_obligations
        type: string
        required: true
      - name: template_contract_alignment
        type: string
        required: true
      - name: eval_inheritance_coverage
        type: string
        required: true
      - name: external_method_signature_fidelity
        type: string
        required: true
      - name: high_stakes_recommendation_guard
        type: string
        required: true
      - name: mirror_surface_sync
        type: string
        required: true
      - name: semantic_findings_summary
        type: string
        required: true

  - name: bugfix_evidence_review
    type: object
    required: conditional
    condition: "review material represents a bugfix or workflow task_type == bugfix"
    description: "Review of reproduction/root-cause evidence and regression linkage for bugfixes"
    validation: "Must state whether assistant-debugging evidence or an explicit not-applicable/blocker rationale was reviewed, and whether regression coverage traces to the isolated failure mechanism"
    object_fields:
      - name: debugging_evidence_present
        type: boolean
        required: true
      - name: reproduction_or_blocker
        type: string
        required: true
      - name: root_cause_or_mitigation
        type: string
        required: true
      - name: regression_linkage
        type: enum
        required: true
        enum_values: [confirmed, missing, not_applicable, blocked]
      - name: residual_debugging_risks
        type: string[]
        required: true

  - name: build_verification
    type: object
    required: true
    condition: "mode == review-fix"
    description: "Build and test results after all fixes applied"
    validation: "Must show passed build/test verification or an explicit not_applicable build_result before review completion"
    object_fields:
      - name: build_result
        type: enum
        required: true
        enum_values: [passed, failed, not_applicable]
      - name: test_summary
        type: object
        required: true
        condition: "build_result != not_applicable"
        object_fields:
          - name: passed
            type: int
            required: true
          - name: failed
            type: int
            required: true
            validation: "Must be 0 at review completion"
          - name: skipped
            type: int
            required: true

  - name: task_journal_entry
    type: string
    required: true
    condition: "task_journal_path is not null"
    description: "Review Log entry appended to the task journal with Final Result"
    validation: "Entry follows the task-journal-template.md Review Log format"

  - name: audit_report
    type: object
    required: true
    condition: "mode == audit"
    description: "Full findings report when running in audit mode (no fixes)"
    validation: "Must include all audit findings and an overall summary before audit results are presented"
    object_fields:
      - name: findings
        type: object[]
        required: true
        description: "All findings grouped by severity"
        object_fields:
          - name: severity
            type: enum
            required: true
            enum_values: [must-fix, should-fix, nit]
          - name: file
            type: string
            required: true
          - name: line
            type: int
            required: false
          - name: description
            type: string
            required: true
          - name: confidence_pct
            type: int
            required: true
      - name: summary
        type: string
        required: true
        description: "Overall assessment paragraph"

# Completeness check:
# Before presenting results to user:
# 1. final_summary is fully populated
# 2. If mode=review-fix: build_verification shows passed and 0 test failures
# 3. If task journal exists: Review Log has been updated with entry + Final Result
# 4. If mode=audit: audit_report contains all findings, no fixes were applied
# 5. If semantic_contract_review_required=true: semantic_contract_review is populated and semantic findings are included in final_summary/audit_report
# 6. If behavioral_contract_review_required=true: behavioral_contract_review is populated and behavioral findings are included in final_summary/audit_report
# 7. If agentic_loop_safety_review_required=true: agentic_loop_safety_review is populated and loop-safety findings are included in final_summary/audit_report
# 8. If qa_evaluation_mode=required: qa_evaluation_delegation_path and qa_evaluation_result are populated after build/test and code-review evidence; QA result does not replace final_summary or code-review artifacts
# 9. If scoped domain rubrics were used: qa_evaluation_result includes selected_domain_rubrics and domain_quality_scores; if not scoped, no invented domain rubric output is required or accepted
# 10. If review or QA triggered STAGNATION, repeated DRIFT, repeated REGRESSION, or pivot action: pivot_restart_decision is populated before any additional review/fix/QA/build dispatch

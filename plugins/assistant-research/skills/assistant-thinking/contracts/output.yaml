schema_version: "1.0"
contract: output
skill: assistant-thinking

artifacts:
  - name: tool_used
    type: enum
    required: true
    description: "Which thinking tool was applied"
    enum_values: [clarify, perspectives, stress_test, deep_think, hypothesize, creative]
    on_fail: "Re-run TOOL_SELECTION phase to identify the correct tool"

  - name: key_insights
    type: string[]
    required: true
    description: "Actionable insights discovered through the analysis"
    validation: "At least 1 insight, each is a concrete and actionable finding"
    min_items: 1
    on_fail: "Re-run SYNTHESIS phase to extract actionable insights"

  - name: recommendation
    type: string
    required: true
    description: "What to do based on the analysis"
    validation: "A clear, actionable recommendation grounded in the insights"
    on_fail: "Re-run SYNTHESIS phase to produce a recommendation"

  - name: confidence
    type: enum
    required: true
    description: "How confident the analysis is in its recommendation"
    enum_values: [high, medium, low]
    on_fail: "Re-run SYNTHESIS phase to assess confidence level"

  - name: dissenting_view
    type: string
    required: false
    description: "The strongest counter-argument to the recommendation"
    validation: "A genuine challenge, not a strawman"
    on_fail: "Re-run ANALYSIS phase to identify the strongest counter-argument"

  - name: gaps_or_assumptions
    type: string[]
    required: true
    description: "Known gaps, assumptions, or evidence limits that affect confidence"
    validation: "Use an empty list only when confidence is high and no material gaps remain"
    on_fail: "List the uncertainty limits or explicitly justify why no material gaps remain"

  - name: evidence_or_observations
    type: string[]
    required: true
    description: "Facts, observations, test results, or user-provided constraints the reasoning used"
    validation: "At least one entry unless the task is purely hypothetical"
    on_fail: "Add the facts, observations, tests, or constraints used; for hypothetical tasks state that no external evidence was available"

  - name: delegation_path
    type: object
    required: conditional
    condition: "tool_used in [perspectives, stress_test]"
    description: "How independent roles or attack angles were executed"
    validation: "States subagent_policy_state, subagent_execution_mode, authorization scope when any, and whether roles/angles were delegated or run sequentially in fallback"
    on_fail: "Record delegated execution or sequential fallback before presenting synthesis; do not imply subagents were used when they were not authorized or available"
    object_fields:
      - name: subagent_policy_state
        type: enum
        required: true
        enum_values: [not_required, authorization_required, delegation_authorized, authorization_denied, subagents_unavailable, policy_disallowed]
      - name: subagent_execution_mode
        type: enum
        required: true
        enum_values: [delegated, sequential_fallback, not_applicable]
      - name: subagent_authorization_scope
        type: string[]
        required: true
      - name: execution_note
        type: string
        required: true
        validation: "Names whether roles/angles were delegated or run sequentially, with the reason"

  - name: decision_artifacts
    type: object
    required: conditional
    condition: "tool_used in [perspectives, stress_test, deep_think] and the output is a decision"
    description: "Options, criteria, and validation step for decision-oriented reasoning"
    validation: "Includes options considered, decision criteria, selected option, and next validation step"
    on_fail: "Re-run decision synthesis and include options considered, criteria, selected option, and validation or rollback step"

  - name: debug_artifacts
    type: object
    required: conditional
    condition: "tool_used == hypothesize"
    description: "Hypotheses, tests, disconfirming evidence, and conclusion for debugging uncertainty"
    validation: "Includes at least three hypotheses unless fewer are plausible, tests performed or proposed, and what would disprove the current conclusion"
    on_fail: "Re-run hypothesis analysis and include hypotheses, tests, disconfirming evidence, and conclusion"

# Research Input Contract
# Resolve these fields before starting any research activity.

schema_version: "1.0"
contract: input
skill: assistant-research

fields:
  - name: question
    type: string
    required: true
    description: "The question or topic to research"
    validation: "Non-empty. Must be specific enough to search for — not 'tell me about stuff'."
    on_missing: ask
    ask_prompt: "What would you like me to research?"

  - name: tier
    type: enum
    required: true
    enum_values: [quick, standard, extensive, deep]
    description: "Research depth — determines evidence budget, source diversity, and effort"
    on_missing: infer
    infer_from: >
      Simple factual question with likely single answer → quick.
      Technology comparison, multi-source needed → standard.
      Decision support, comprehensive coverage → extensive.
      Market mapping, novel domain, primary sources needed → deep.

  - name: tool
    type: enum
    required: true
    enum_values: [research, investigate]
    description: "Which research tool to use"
    on_missing: infer
    infer_from: >
      Broad exploration ('what options exist', 'compare') → research.
      Deep dive on specific entity ('how does X work', 'entity profile') → investigate.

  - name: research_method
    type: enum
    required: true
    enum_values: [source_research, five_lens_briefing]
    description: "Source-first lookup versus STORM-inspired multi-perspective decision briefing"
    on_missing: infer
    infer_from: >
      Simple lookup, direct facts, or ordinary source collection → source_research.
      Decision support, due diligence, strategy, investing/trading, architecture, vendor/tool evaluation,
      unfamiliar domains, controversial/hyped topics, or prompts asking for deep understanding → five_lens_briefing.

  - name: user_role_or_goal
    type: string
    required: false
    description: "The user's role, decision, or intended action that the briefing should optimize for"
    default: "unspecified"

  - name: output_purpose
    type: string
    required: false
    description: "What the research results will be used for — scopes the search"
    examples:
      - "Informing a technology decision"
      - "Background for a plan phase"
      - "Answering a user question"
      - "Due diligence on a vendor"

  - name: known_context
    type: string[]
    required: false
    description: "What the user already knows — avoid re-researching known facts"
    default: []

# Validation behavior:
# 1. Resolve question, tier, tool, and research_method before any search activity
# 2. Log: >> Research: {tier} | tool: {tool} | method: {research_method} | question: "{question (truncated to 80 chars)}"
# 3. Read the corresponding tool file (research.md, five-lens-briefing.md, or investigate.md) for detailed instructions

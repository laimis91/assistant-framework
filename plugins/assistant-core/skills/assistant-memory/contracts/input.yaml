# contract header
schema_version: "1.0"
contract: input
skill: assistant-memory

fields:
  - name: action
    type: enum
    required: true
    description: "What memory operation to perform"
    validation: "Must be a supported memory action"
    on_missing: ask
    enum_values: [save, recall, update, forget, search]

  - name: policy_context
    type: enum
    required: false
    description: "Whether durable memory is allowed in the current environment"
    validation: "Use unknown only until project/workplace policy is discovered"
    on_missing: infer
    infer_from: "If user or project says no memory/persistence/external tools -> disallowed; if configured local backend exists and policy allows -> allowed; otherwise unknown"
    enum_values: [allowed, disallowed, unknown]

  - name: content
    type: string
    required: conditional
    condition: "when action is save or update"
    description: "What to remember or update"
    validation: "Non-empty string"
    on_missing: ask

  - name: entity_type
    type: enum
    required: conditional
    condition: "when action is save"
    description: "Knowledge graph entity type for the memory being saved"
    validation: "Must be a supported entity type"
    on_missing: ask
    enum_values: [Rule, Preference, Insight, Project, Technology, Pattern, Convention]

  - name: query
    type: string
    required: conditional
    condition: "when action is recall or search"
    description: "What to look for in memory"
    validation: "Non-empty string"
    on_missing: ask

# Handoff Contracts
# Defines the data shape that flows between subagents.
# Think of these as API contracts between microservices — the producer must
# include all required fields, and the consumer must validate before using.
#
# Any agent dispatching a subagent MUST include the required context fields.
# Any subagent returning results MUST include the required output fields.
# If a required field is missing from the return, follow the on_missing action.

schema_version: "1.0"
contract: handoffs
skill: assistant-workflow

# ─────────────────────────────────────────────
# Worker Status Protocol
# ─────────────────────────────────────────────
worker_status_protocol:
  description: "CodeMapper, Explorer, Architect, CodeWriter, BuilderTester, and Reviewer returns include a compact status packet so the orchestrator can route results deterministically."
  statuses:
    - value: DONE
      meaning: "No known concerns; requested work completed within scope."
    - value: DONE_WITH_CONCERNS
      meaning: "Usable result, but follow-up risk or trade-off exists and is recorded."
    - value: NEEDS_CONTEXT
      meaning: "Orchestration must clarify missing information before the worker can proceed."
    - value: BLOCKED
      meaning: "Cannot proceed because an environment, dependency, permission, or tool issue prevents progress."
    - value: DEVIATED
      meaning: "The worker had to depart from the approved plan or requested scope; deviation evidence is required."
    - value: FAILED_VERIFICATION
      meaning: "Verification ran and failed; failure evidence is required."
  packet_rules:
    - "status is required on CodeMapper, Explorer, Architect, CodeWriter, BuilderTester, and Reviewer returns."
    - "evidence is required for CodeMapper, Explorer, Architect, CodeWriter, and Reviewer returns with DONE, DONE_WITH_CONCERNS, DEVIATED, or FAILED_VERIFICATION."
    - "verification.evidence is required for BuilderTester returns."
    - "open_questions is required for NEEDS_CONTEXT and BLOCKED."
    - "deviation_details is required for Architect and CodeWriter returns with DEVIATED."
    - "CodeMapper, Explorer, and Reviewer status values are limited to DONE, DONE_WITH_CONCERNS, NEEDS_CONTEXT, and BLOCKED."
    - "Architect and CodeWriter status values also include DEVIATED."
    - "BuilderTester status values also include DEVIATED and FAILED_VERIFICATION."
    - "changed_files and files_changed are required with at least one item for CodeWriter returns with DONE, DONE_WITH_CONCERNS, or DEVIATED; they may be omitted or empty for NEEDS_CONTEXT/BLOCKED returns before file changes occur."
    - "verification is required for BuilderTester returns; if status is NEEDS_CONTEXT or BLOCKED before verification runs, return result not_run with concise blocker evidence."
    - "findings is required for Reviewer returns."

# ─────────────────────────────────────────────
# Orchestrator → CodeMapper
# ─────────────────────────────────────────────
handoffs:

  - name: orchestrator_to_code_mapper
    from: Orchestrator
    to: CodeMapper
    phase: DISCOVER
    context_fields:
      - name: task_description
        type: string
        required: true
        description: "What the task is about — scopes the mapping"
      - name: target_area
        type: string
        required: false
        description: "Specific module/directory to focus on, if known"
      - name: constraints
        type: string[]
        required: false
        description: "Boundaries the mapper should note (e.g., 'ignore tests/')"
    return_fields:
      - name: status
        type: enum
        required: true
        enum_values: [DONE, DONE_WITH_CONCERNS, NEEDS_CONTEXT, BLOCKED]
        description: "Worker status packet result"
      - name: evidence
        type: object[]
        required: true
        description: "File paths or searches that support the map"
        min_items: 1
        object_fields:
          - name: source
            type: string
            required: true
          - name: detail
            type: string
            required: true
      - name: open_questions
        type: string[]
        required: false
        condition: "status in [NEEDS_CONTEXT, BLOCKED]"
        description: "Questions or blocker details the orchestrator must resolve before discovery can continue"
      - name: project_type
        type: string
        required: true
        description: "Detected project type (e.g., 'ASP.NET Core Web API', 'Blazor WASM', 'Console app')"
        validation: "Non-empty, specific enough to inform architecture decisions"
      - name: entry_points
        type: object[]
        required: true
        description: "Main entry points relevant to the task"
        min_items: 1
        object_fields:
          - name: file
            type: string
            required: true
          - name: description
            type: string
            required: true
      - name: key_interfaces
        type: object[]
        required: true
        description: "Interfaces and contracts relevant to the task"
        object_fields:
          - name: name
            type: string
            required: true
          - name: file
            type: string
            required: true
          - name: purpose
            type: string
            required: true
      - name: conventions
        type: object[]
        required: true
        description: "Coding conventions observed in the codebase"
        min_items: 1
        object_fields:
          - name: pattern
            type: string
            required: true
          - name: example
            type: string
            required: true
      - name: dependencies
        type: string[]
        required: true
        description: "External packages and frameworks in use"
      - name: file_map
        type: object[]
        required: true
        description: "Files relevant to the task with their roles"
        min_items: 1
        object_fields:
          - name: path
            type: string
            required: true
          - name: role
            type: string
            required: true
      - name: test_locations
        type: object[]
        required: true
        description: "Where tests live for the relevant areas"
        object_fields:
          - name: area
            type: string
            required: true
          - name: test_file
            type: string
            required: true
          - name: type
            type: enum
            required: true
            enum_values: [unit, integration, e2e]
    on_missing_field: "Re-dispatch CodeMapper with explicit request for the missing field"

  # ─────────────────────────────────────────────
  # Orchestrator → Explorer
  # ─────────────────────────────────────────────
  - name: orchestrator_to_explorer
    from: Orchestrator
    to: Explorer
    phase: DISCOVER
    context_fields:
      - name: task_description
        type: string
        required: true
      - name: focus_areas
        type: string[]
        required: true
        description: "Specific execution paths or behaviors to trace"
      - name: context_map
        type: string
        required: false
        description: "Output from CodeMapper if available — avoids re-exploring structure"
    return_fields:
      - name: status
        type: enum
        required: true
        enum_values: [DONE, DONE_WITH_CONCERNS, NEEDS_CONTEXT, BLOCKED]
        description: "Worker status packet result"
      - name: evidence
        type: object[]
        required: true
        description: "Files, searches, or traces that support the findings"
        min_items: 1
        object_fields:
          - name: source
            type: string
            required: true
          - name: detail
            type: string
            required: true
      - name: open_questions
        type: string[]
        required: false
        condition: "status in [NEEDS_CONTEXT, BLOCKED]"
        description: "Questions or blocker details the orchestrator must resolve before discovery can continue"
      - name: execution_paths
        type: object[]
        required: true
        description: "Traced paths through the code relevant to the task"
        object_fields:
          - name: trigger
            type: string
            required: true
            description: "What initiates this path (HTTP request, event, command, etc.)"
          - name: steps
            type: string[]
            required: true
            description: "Ordered list of method calls / service interactions"
          - name: side_effects
            type: string[]
            required: false
            description: "Database writes, API calls, events emitted"
      - name: design_decisions
        type: object[]
        required: true
        description: "Architectural choices and their rationale"
        object_fields:
          - name: decision
            type: string
            required: true
          - name: rationale
            type: string
            required: true
          - name: location
            type: string
            required: true
      - name: hidden_dependencies
        type: object[]
        required: false
        description: "Non-obvious coupling or dependencies"
        object_fields:
          - name: from
            type: string
            required: true
          - name: to
            type: string
            required: true
          - name: nature
            type: string
            required: true
            description: "What kind of dependency (runtime, config, convention, implicit)"
    on_missing_field: "Re-dispatch Explorer with specific questions about the missing area"

  # ─────────────────────────────────────────────
  # Orchestrator → Architect (DECOMPOSE)
  # ─────────────────────────────────────────────
  - name: orchestrator_to_architect_decompose
    from: Orchestrator
    to: Architect
    phase: DECOMPOSE
    context_fields:
      - name: task_description
        type: string
        required: true
        description: "What the task is about — scopes the decomposition"
      - name: requirements_summary
        type: string
        required: true
        description: "Restated requirements from Discover phase"
      - name: context_map
        type: string
        required: true
        description: "CodeMapper output — Architect uses this to understand codebase boundaries"
      - name: explorer_findings
        type: string
        required: false
        description: "Explorer output if available (large/mega tasks)"
      - name: constraints
        type: string[]
        required: true
        description: "All accumulated constraints"
      - name: task_size
        type: enum
        required: true
        enum_values: [medium, large, mega]
        description: "Determines component count range (medium: 2-7, large/mega: 3-7)"
    return_fields:
      - name: status
        type: enum
        required: true
        enum_values: [DONE, DONE_WITH_CONCERNS, NEEDS_CONTEXT, BLOCKED, DEVIATED]
        description: "Worker status packet result"
      - name: evidence
        type: object[]
        required: true
        description: "Files, patterns, or searches that support the decomposition"
        min_items: 1
        object_fields:
          - name: source
            type: string
            required: true
          - name: detail
            type: string
            required: true
      - name: open_questions
        type: string[]
        required: false
        condition: "status in [NEEDS_CONTEXT, BLOCKED]"
        description: "Questions or blocker details the orchestrator must resolve before decomposition can continue"
      - name: deviation_details
        type: string
        required: false
        condition: "status is DEVIATED"
        description: "What the decomposition had to change from the requested scope or approved direction"
      - name: components
        type: object[]
        required: true
        description: "Ordered list of independently verifiable components"
        min_items: 2
        object_fields:
          - name: order
            type: int
            required: true
          - name: name
            type: string
            required: true
            description: "Short descriptive name (e.g., 'shared-contracts', 'api-endpoints', 'ui-binding')"
          - name: description
            type: string
            required: true
            description: "1-2 sentence description of what this component delivers"
          - name: files
            type: string[]
            required: true
            description: "Files to create or modify"
            min_items: 1
          - name: depends_on
            type: string[]
            required: true
            description: "Names of prerequisite components, or empty array if independent"
          - name: verification_criteria
            type: string[]
            required: true
            description: "Binary pass/fail statements — each must be observable via test, build, or inspection"
            min_items: 1
      - name: decomposition_pattern
        type: enum
        required: true
        enum_values: [by_layer, by_feature, by_module, contracts_first]
        description: "Which decomposition strategy was applied"
      - name: shared_contracts_needed
        type: boolean
        required: true
        description: "Whether component #1 is a shared contracts component"
      - name: risks
        type: object[]
        required: true
        min_items: 1
        object_fields:
          - name: description
            type: string
            required: true
          - name: mitigation
            type: string
            required: true
    on_missing_field: "Re-dispatch Architect requesting the missing decomposition field"

  # ─────────────────────────────────────────────
  # Orchestrator → Architect (PLAN)
  # ─────────────────────────────────────────────
  - name: orchestrator_to_architect
    from: Orchestrator
    to: Architect
    phase: PLAN
    context_fields:
      - name: task_description
        type: string
        required: true
      - name: requirements_summary
        type: string
        required: true
        description: "Restated requirements from Discover phase"
      - name: context_map
        type: string
        required: true
        description: "CodeMapper output — the Architect builds on this, not from scratch"
      - name: explorer_findings
        type: string
        required: false
        description: "Explorer output if available (large/mega tasks)"
      - name: constraints
        type: string[]
        required: true
        description: "All accumulated constraints"
      - name: component_manifest
        type: object[]
        required: false
        condition: "size in [medium, large, mega]"
        description: "Component decomposition from DECOMPOSE phase — Architect aligns plan steps to components"
        object_fields:
          - name: order
            type: int
            required: true
            description: "Build sequence — plan steps must respect this ordering"
          - name: name
            type: string
            required: true
          - name: description
            type: string
            required: true
          - name: files
            type: string[]
            required: true
          - name: depends_on
            type: string[]
            required: true
            description: "Component names that must be built first"
          - name: verification_criteria
            type: string[]
            required: true
    return_fields:
      - name: status
        type: enum
        required: true
        enum_values: [DONE, DONE_WITH_CONCERNS, NEEDS_CONTEXT, BLOCKED, DEVIATED]
        description: "Worker status packet result"
      - name: evidence
        type: object[]
        required: true
        description: "Files, patterns, or searches that support the blueprint"
        min_items: 1
        object_fields:
          - name: source
            type: string
            required: true
          - name: detail
            type: string
            required: true
      - name: open_questions
        type: string[]
        required: false
        condition: "status in [NEEDS_CONTEXT, BLOCKED]"
        description: "Questions or blocker details the orchestrator must resolve before planning can continue"
      - name: deviation_details
        type: string
        required: false
        condition: "status is DEVIATED"
        description: "What the blueprint had to change from the requested scope or approved direction"
      - name: implementation_steps
        type: object[]
        required: true
        description: "Ordered executable task packets with exact create/modify/test file lists, acceptance/test criteria, and verification commands. Legacy readers may also inspect files when present, but executable plans must use the exact files_to_* fields."
        min_items: 1
        object_fields:
          - name: order
            type: int
            required: true
          - name: task_id
            type: string
            required: false
            description: "Stable task packet id when using executable task packets"
          - name: description
            type: string
            required: true
          - name: files
            type: string[]
            required: false
            description: "Legacy-readable summary of file paths this step touches; do not use as the executable task packet contract"
          - name: files_to_create
            type: string[]
            required: true
            description: "Exact files CodeWriter is expected to create for this task packet; use an empty array when none"
          - name: files_to_modify
            type: string[]
            required: true
            description: "Exact existing files CodeWriter is expected to modify for this task packet; use an empty array when none"
          - name: files_to_test
            type: string[]
            required: true
            description: "Exact test files or verification targets BuilderTester is expected to create, modify, or run for this task packet; use an empty array only when no test file applies"
          - name: acceptance_criteria
            type: string[]
            required: true
            description: "Observable behavior this task packet must deliver"
          - name: test_criteria
            type: string[]
            required: true
            description: "What to test after this step"
            min_items: 1
          - name: verification_command
            type: string
            required: true
            description: "Exact command BuilderTester should run for this step or task packet"
          - name: expected_success_signal
            type: string
            required: true
            description: "Specific pass signal for the verification command"
          - name: deviation_rollback_rule
            type: string
            required: true
            description: "What to do if the implementation cannot follow this step exactly"
          - name: component_name
            type: string
            required: false
            condition: "size in [medium, large, mega]"
            description: "Which component from the DECOMPOSE manifest this step belongs to — enables per-component verification in BUILD"
      - name: files_to_create
        type: object[]
        required: false
        object_fields:
          - name: path
            type: string
            required: true
          - name: purpose
            type: string
            required: true
          - name: template
            type: string
            required: false
            description: "Existing file to use as structural reference"
      - name: files_to_modify
        type: object[]
        required: true
        object_fields:
          - name: path
            type: string
            required: true
            validation: "File must exist in the project"
          - name: change_description
            type: string
            required: true
      - name: interfaces
        type: object[]
        required: false
        description: "New interfaces or contracts to define"
        object_fields:
          - name: name
            type: string
            required: true
          - name: file
            type: string
            required: true
          - name: methods
            type: string[]
            required: true
      - name: test_plan
        type: object[]
        required: true
        description: "What to test and how"
        min_items: 1
        object_fields:
          - name: component
            type: string
            required: true
          - name: test_type
            type: enum
            required: true
            enum_values: [unit, integration, e2e]
          - name: description
            type: string
            required: true
      - name: risks
        type: object[]
        required: true
        min_items: 1
        object_fields:
          - name: description
            type: string
            required: true
          - name: mitigation
            type: string
            required: true
    on_missing_field: "Re-dispatch Architect requesting the specific missing section"

  # ─────────────────────────────────────────────
  # Orchestrator → CodeWriter
  # ─────────────────────────────────────────────
  - name: orchestrator_to_code_writer
    from: Orchestrator
    to: CodeWriter
    phase: BUILD
    context_fields:
      - name: plan
        type: string
        required: true
        description: "Approved plan — the CodeWriter follows this exactly"
      - name: current_step
        type: int
        required: true
        description: "Which step(s) to implement"
      - name: current_task_packet
        type: object
        required: false
        condition: "plan uses executable task packets"
        description: "Executable task packet for the current build step; overrides any ambiguous prose in the plan"
        object_fields:
          - name: task_id
            type: string
            required: true
          - name: name
            type: string
            required: true
          - name: behavior_acceptance_criteria
            type: string[]
            required: true
          - name: files_to_create
            type: string[]
            required: true
          - name: files_to_modify
            type: string[]
            required: true
          - name: files_to_test
            type: string[]
            required: true
          - name: tdd_applies
            type: boolean
            required: true
          - name: red_command
            type: string
            required: false
            description: "Planning field for BuilderTester RED execution; not RED evidence and not sufficient to pass the implementation gate"
          - name: expected_red_failure
            type: string
            required: false
            description: "Planning field for expected RED behavior; not RED evidence and not sufficient to pass the implementation gate"
          - name: red_evidence
            type: object
            required: false
            condition: "required when tdd_applies is true or tdd_mode is true"
            description: "BuilderTester RED evidence received by CodeWriter before implementation; CodeWriter does not own RED and must return NEEDS_CONTEXT if this evidence is missing while TDD is active"
            object_fields:
              - name: test_file
                type: string
                required: true
                description: "Test file written or modified by BuilderTester for the RED step"
              - name: test_name
                type: string
                required: true
                description: "Specific failing test that proves the desired behavior is not implemented yet"
              - name: command
                type: string
                required: true
                description: "Exact command BuilderTester ran to produce the RED failure"
              - name: failure_summary
                type: string
                required: true
                description: "Concise failure evidence from the RED run, not raw logs"
              - name: right_reason
                type: string
                required: true
                description: "Why the failure demonstrates the intended missing behavior instead of a syntax, setup, or unrelated error"
          - name: implementation_notes
            type: string[]
            required: true
          - name: verification_command
            type: string
            required: true
          - name: expected_success_signal
            type: string
            required: true
          - name: deviation_rollback_rule
            type: string
            required: true
      - name: context_map
        type: string
        required: true
        description: "CodeMapper output for codebase orientation"
      - name: conventions
        type: object[]
        required: true
        description: "Coding conventions to follow (from context map)"
      - name: constraints
        type: string[]
        required: true
        description: "Boundaries that must not be crossed"
      - name: tdd_mode
        type: boolean
        required: false
        default: false
        description: "If true, CodeWriter must receive BuilderTester RED evidence before production changes and return NEEDS_CONTEXT if RED evidence is missing"
    return_fields:
      - name: status
        type: enum
        required: true
        enum_values: [DONE, DONE_WITH_CONCERNS, NEEDS_CONTEXT, BLOCKED, DEVIATED]
        description: "Worker status packet result"
      - name: changed_files
        type: object[]
        required: false
        condition: "required with min_items: 1 when status in [DONE, DONE_WITH_CONCERNS, DEVIATED]; optional and may be empty or omitted when status in [NEEDS_CONTEXT, BLOCKED]"
        min_items: 0
        description: "Files created, modified, or deleted by this worker. Do not invent entries when the worker returns NEEDS_CONTEXT or BLOCKED before changing files."
        object_fields:
          - name: path
            type: string
            required: true
          - name: change_type
            type: enum
            required: true
            enum_values: [created, modified, deleted]
          - name: description
            type: string
            required: true
      - name: evidence
        type: object[]
        required: false
        condition: "required with min_items: 1 when status in [DONE, DONE_WITH_CONCERNS, DEVIATED]; optional and may be empty or omitted when status in [NEEDS_CONTEXT, BLOCKED]"
        description: "Specific implementation evidence, such as file paths and important changed behavior. Do not invent implementation evidence when the worker returns NEEDS_CONTEXT or BLOCKED before changing files."
        min_items: 0
        object_fields:
          - name: source
            type: string
            required: true
          - name: detail
            type: string
            required: true
      - name: open_questions
        type: string[]
        required: false
        condition: "status in [NEEDS_CONTEXT, BLOCKED]"
        description: "Questions or blocker details the orchestrator must resolve before implementation can continue"
      - name: files_changed
        type: object[]
        required: false
        condition: "required with min_items: 1 when status in [DONE, DONE_WITH_CONCERNS, DEVIATED]; optional and may be empty or omitted when status in [NEEDS_CONTEXT, BLOCKED]"
        description: "Legacy alias for changed_files; keep populated for implementation statuses until downstream consumers migrate. Do not invent entries for NEEDS_CONTEXT or BLOCKED before file changes."
        min_items: 0
        object_fields:
          - name: path
            type: string
            required: true
          - name: change_type
            type: enum
            required: true
            enum_values: [created, modified, deleted]
          - name: description
            type: string
            required: true
      - name: tests_written
        type: object[]
        required: true
        description: "Tests created or modified in this step"
        min_items: 0
        object_fields:
          - name: file
            type: string
            required: true
          - name: test_names
            type: string[]
            required: true
      - name: deviation_detected
        type: boolean
        required: true
        description: "True if the plan didn't match reality"
      - name: deviation_details
        type: string
        required: false
        description: "What the plan assumed vs. what was found"
        condition: "when deviation_detected is true or status is DEVIATED"
    on_missing_field: "CodeWriter must always return status and deviation_detected at minimum. For DONE, DONE_WITH_CONCERNS, or DEVIATED, it must also return changed_files, evidence, and files_changed with real implementation evidence; for NEEDS_CONTEXT/BLOCKED, require open_questions and do not require fabricated changed-file entries."

  # ─────────────────────────────────────────────
  # Orchestrator → BuilderTester
  # ─────────────────────────────────────────────
  - name: orchestrator_to_builder_tester
    from: Orchestrator
    to: BuilderTester
    phase: BUILD
    context_fields:
      - name: changed_files
        type: string[]
        required: true
        description: "Files that were just modified (from CodeWriter return)"
      - name: files_changed
        type: string[]
        required: false
        description: "Legacy alias for changed_files"
      - name: build_command
        type: string
        required: false
        description: "Custom build command if non-standard"
      - name: test_targets
        type: string[]
        required: true
        description: "Test projects or files to run"
      - name: current_task_packet
        type: object
        required: false
        condition: "plan uses executable task packets"
        description: "Executable task packet being verified, including command and success signal"
        object_fields:
          - name: task_id
            type: string
            required: true
          - name: name
            type: string
            required: true
          - name: behavior_acceptance_criteria
            type: string[]
            required: true
          - name: files_to_test
            type: string[]
            required: true
          - name: verification_command
            type: string
            required: true
          - name: expected_success_signal
            type: string
            required: true
          - name: expected_red_failure
            type: string
            required: false
    return_fields:
      - name: status
        type: enum
        required: true
        enum_values: [DONE, DONE_WITH_CONCERNS, NEEDS_CONTEXT, BLOCKED, DEVIATED, FAILED_VERIFICATION]
        description: "Worker status packet result"
      - name: verification
        type: object
        required: true
        description: "Commands/checks run and concise pass/fail evidence"
        object_fields:
          - name: commands
            type: string[]
            required: true
            min_items: 0
            description: "Commands/checks actually run; empty only when verification.result is not_run for NEEDS_CONTEXT or BLOCKED."
          - name: result
            type: enum
            required: true
            enum_values: [passed, failed, not_run]
          - name: evidence
            type: string[]
            required: true
            description: "Concise success signals or failure messages, not raw logs"
      - name: open_questions
        type: string[]
        required: false
        condition: "status in [NEEDS_CONTEXT, BLOCKED]"
        description: "Questions or blocker details the orchestrator must resolve"
      - name: build_result
        type: enum
        required: true
        enum_values: [passed, failed, not_run]
        description: "Build result. Use not_run only when status is NEEDS_CONTEXT or BLOCKED before verification can run; do not fabricate passed/failed results."
      - name: build_errors
        type: string[]
        required: false
        condition: "when build_result is failed"
        description: "Concise error descriptions — not raw logs"
      - name: test_summary
        type: object
        required: true
        object_fields:
          - name: passed
            type: int
            required: true
          - name: failed
            type: int
            required: true
          - name: skipped
            type: int
            required: true
      - name: test_failures
        type: object[]
        required: false
        condition: "test_summary.failed > 0"
        object_fields:
          - name: test_name
            type: string
            required: true
          - name: error
            type: string
            required: true
            description: "Concise error — assertion message + expected/actual, not stack trace"
    on_missing_field: "Re-dispatch BuilderTester. status, verification, build_result, and test_summary are never optional."

  # ─────────────────────────────────────────────
  # Orchestrator → Reviewer
  # ─────────────────────────────────────────────
  - name: orchestrator_to_reviewer
    from: Orchestrator
    to: Reviewer
    phase: REVIEW
    context_fields:
      - name: review_material_snapshot
        type: object
        required: true
        description: "Material to review: diff, file contents/excerpts, task snapshot, PR snapshot, or pasted content"
        object_fields:
          - name: kind
            type: enum
            required: true
            enum_values: [diff, files, task_snapshot, pr_snapshot, content]
          - name: summary
            type: string
            required: true
          - name: material
            type: string
            required: true
          - name: files
            type: string[]
            required: false
            default: []
      - name: round
        type: int
        required: true
        description: "Current review round number"
      - name: previously_fixed
        type: object[]
        required: true
        description: "Items fixed in prior rounds — reviewer must NOT re-report these"
        object_fields:
          - name: description
            type: string
            required: true
          - name: fixed_in_round
            type: int
            required: true
      - name: confidence_threshold
        type: int
        required: true
        description: "Minimum confidence percentage for reporting findings"
        validation: "Must be one of: 80, 85, 90"
        notes: "Round 1-2: 80, Round 3-4: 85, Round 5: 90"
    return_fields:
      - name: status
        type: enum
        required: true
        enum_values: [DONE, DONE_WITH_CONCERNS, NEEDS_CONTEXT, BLOCKED]
        description: "Worker status packet result; DONE requires no must-fix or should-fix findings"
      - name: round
        type: int
        required: true
      - name: findings
        type: object[]
        required: true
        description: "All findings above the confidence threshold"
        object_fields:
          - name: severity
            type: enum
            required: true
            enum_values: [must-fix, should-fix, nit]
          - name: file
            type: string
            required: true
          - name: line
            type: int
            required: false
          - name: description
            type: string
            required: true
          - name: confidence_pct
            type: int
            required: true
            validation: "Must be >= confidence_threshold for this round"
          - name: suggestion
            type: string
            required: false
            description: "Concrete fix suggestion when applicable"
      - name: summary
        type: string
        required: true
        description: "1-paragraph summary of overall code quality"
      - name: verdict
        type: enum
        required: true
        enum_values: [clean, has_must_fix, has_should_fix, has_nits_only]
      - name: evidence
        type: object[]
        required: true
        description: "Review material, files, or checks used to support the findings/verdict"
        min_items: 1
        object_fields:
          - name: source
            type: string
            required: true
          - name: detail
            type: string
            required: true
      - name: open_questions
        type: string[]
        required: false
        condition: "status in [NEEDS_CONTEXT, BLOCKED]"
        description: "Questions or blocker details the orchestrator must resolve"
    on_missing_field: "Re-dispatch Reviewer. status, findings, evidence, and verdict are never optional."

# ─────────────────────────────────────────────
# Validation behavior for all handoffs:
#
# 1. Before dispatching: verify all required context_fields are populated
# 2. After return: verify all required return_fields are present, including the worker status packet
# 3. If on_missing_field action is "re-dispatch": retry once with explicit request
# 4. If second dispatch also missing fields: log the gap, fill manually, and continue
# 5. Never silently proceed with missing required fields — always log what was missing
# ─────────────────────────────────────────────

# Phase Gate Contracts
# Assertions that MUST be true before transitioning between phases.
# Think of these as type checks at function boundaries — the output of phase N
# must satisfy the input contract of phase N+1.
#
# Any agent executing this skill MUST evaluate `exit_assertions` for the current
# phase before printing --- PHASE: {name} COMPLETE ---.
# If an exit assertion fails, the agent MUST resolve it before proceeding.
# `guidance_assertions` are non-blocking reminders unless `strict_only` policy,
# strict hooks, or explicit project policy opts into stricter enforcement.
#
# Gate severity is tiered to avoid turning every useful reminder into a hard
# blocker. `exit_assertions` are blockers because missing them has caused real
# failures. `guidance_assertions` are recommended checks that should shape the
# work, but they do not by themselves block progress unless strict hooks or
# project policy opt into stricter enforcement.

schema_version: "1.0"
contract: phase-gates
skill: assistant-workflow

gate_tiers:
  blocker: "Prevents phase transition; missing evidence would make the workflow unsafe or unverifiable."
  guidance: "Preferred discipline; record or follow when useful, but do not ask ritual questions or block low-risk progress solely for this item."
  strict_only: "Enforced only when hook_profile == strict or project policy explicitly requests full harness enforcement."

gates:

  # ─────────────────────────────────────────────
  # TRIAGE → DISCOVER
  # ─────────────────────────────────────────────
  - phase: TRIAGE
    checkpoint_start: "--- PHASE: TRIAGE ---"
    checkpoint_end: null  # Triage has no COMPLETE line; it flows into Discover
    exit_assertions:

      - id: T1
        check: "size is set to one of: small, medium, large, mega"
        on_fail: "Re-assess task against size criteria table in SKILL.md"

      - id: T2
        check: "phases list is populated and matches the size-to-phases mapping table"
        on_fail: "Correct phases list to match the selected size"

      - id: T4
        check: "task_type is set to one of: feature, bugfix, refactor, migration, rewrite, config, infra, security, docs, spike"
        on_fail: "Load references/triage-rubric.md and classify the work by task category before continuing"

      - id: T5
        check: "risk_tier is set to one of: low, moderate, high, critical"
        on_fail: "Assess risk tier using impact, uncertainty, reversibility, security/data exposure, and behavior parity criteria"

      - id: T6
        check: "required_gates includes common gates plus every applicable task-category gate pack"
        on_fail: "Load references/triage-rubric.md and add the required gate packs for the task type before continuing"

      - id: T7
        check: "required_agents or fallback execution roles are populated from task size, task type, risk tier, subagent_policy_state, and subagent_execution_mode; source-changing development/code-work includes at minimum Code Writer, Builder/Tester, and Reviewer"
        on_fail: "Select required workflow agents when subagent_execution_mode=delegated, or record direct fallback roles and responsibilities from references/subagent-dispatch.md and risk-specific gate packs. not_applicable is invalid for source-changing Build tasks."

      - id: T9
        check: "subagent_policy_state, subagent_execution_mode, and subagent_authorization_scope are initialized before any phase that may spawn subagents"
        on_fail: "Resolve the active adapter/tool policy. If explicit authorization is required, set subagent_policy_state=authorization_required and ask before spawning; otherwise set delegated, direct_fallback, or not_applicable."

    guidance_assertions:

      - id: T3
        severity: guidance
        check: "'>> Triaged as: {SIZE} — phases: {list}' message was printed to user when helpful for shared context"
        on_fail: "Print or summarize the triage result before continuing when the user needs visibility"

      - id: T8
        severity: guidance
        check: "'>> Triage metadata: type={TASK_TYPE} | risk={RISK_TIER} | gates={count} | agents={count}' message was printed to user"
        on_fail: "Print structured triage metadata when medium+ complexity or user visibility needs it"

  # ─────────────────────────────────────────────
  # DISCOVER → DECOMPOSE (medium+) / PLAN (small)
  # ─────────────────────────────────────────────
  - phase: DISCOVER
    checkpoint_start: "--- PHASE: DISCOVER ---"
    checkpoint_end: "--- PHASE: DISCOVER COMPLETE ---"
    exit_assertions:

      - id: D1
        check: "Requirements restated in 1-3 sentences"
        on_fail: "Write a requirements summary before proceeding"

      - id: D1A
        check: "Discovery confirms or updates task_type, risk_tier, required_gates, required_agents, subagent_policy_state, and subagent_execution_mode based on code/context evidence"
        on_fail: "Re-triage with code/context evidence before proceeding"

      - id: D2
        check: "clarification_status is ready and every implementation-shaping field is explicit, explicitly defaulted, or no longer unresolved"
        on_fail: "Persist unresolved clarification topics for every unresolved implementation-shaping field, ask structured clarification questions, and wait for explicit answers or `defaults`."

      - id: D3
        check: "clarification_defaults_applied is explicit (true/false) and unresolved clarification topics are empty before Discover completes"
        on_fail: "Update the saved clarification state so clarification_defaults_applied is explicit true/false and unresolved topics are cleared before continuing"

      - id: D4
        check: "If Discover prints a clarification wait for any task size: task journal exists before the wait when local state artifacts are configured/policy-allowed, or equivalent clarification state is included in the response before the wait"
        on_fail: "Create or update the orchestrator-owned {agent_state_dir}/task.md state artifact when a local state directory is configured and policy allows it; otherwise include Clarification status, defaults applied, and unresolved topics in the response before printing the clarification wait message or continuing"

      - id: D4A
        check: "Clarification question cap is treated as a maximum, not a quota; clear medium+ tasks may complete Discover with zero questions when confidence is high"
        on_fail: "Do not ask ritual questions. Record questions_asked=0, clarification_confidence=high, and clarification_admissibility=not_applicable or satisfied when prompt plus code/context are sufficient."

      - id: D4B
        check: "Every clarification question is admissible: it affects correctness, scope, behavior, data, public contract, security, migration safety, or verification; cannot be resolved from code/context; lacks a safe default; and states risk if guessed"
        on_fail: "Remove non-admissible questions, do more discovery, or state a safe default instead of asking."

      - id: D_CONTEXT_BUDGET
        check: "For medium+ tasks or large material: context_budget_note records exact/pinned, summarized, omitted/deferred, and split/delegation plan"
        condition: "size in [medium, large, mega] or material exceeds faithful single-context review"
        on_fail: "Load references/context-budget-and-pattern-retrieval.md and add the Context Budget note before planning/building"

      - id: D5
        check: "For medium+ tasks: context map exists at {agent_state_dir}/context-map.md when local state artifacts are configured and policy-allowed, or context map content is included in the task/plan packet when state files are unavailable"
        condition: "size in [medium, large, mega]"
        on_fail: "Dispatch Code Mapper or perform local mapping, then persist the context map to {agent_state_dir}/context-map.md when allowed; otherwise carry the context map content forward in the plan packet"

      - id: D7
        check: "constraints list is captured (may be empty, but must be explicitly set)"
        on_fail: "Initialize constraints as empty list and note 'no constraints identified'"

      - id: D_SUBAGENT_AUTH
        check: "If subagent_policy_state == authorization_required: explicit user authorization is obtained before spawning any subagent, or subagent_execution_mode is set to direct_fallback with authorization_denied, subagents_unavailable, or policy_disallowed evidence"
        on_fail: "Ask once for the needed delegation scope before spawning subagents, or record direct fallback evidence and continue without pretending delegation happened"

      - id: D8
        check: "For medium+ tasks: context map was produced by Code Mapper subagent when subagent_execution_mode=delegated, or produced directly in fallback mode with equivalent evidence"
        condition: "size in [medium, large, mega]"
        on_fail: "Produce a context map using delegated execution or direct fallback; record subagent_policy_state, subagent_execution_mode, and which path was used"

      - id: D9
        check: "For large+ tasks: execution paths were traced by Explorer subagent when subagent_execution_mode=delegated, or traced directly in fallback mode with equivalent evidence"
        condition: "size in [large, mega]"
        on_fail: "Trace execution paths using delegated execution or direct fallback; record subagent_policy_state, subagent_execution_mode, and which path was used"

    guidance_assertions:

      - id: D6
        severity: guidance
        check: "For medium+ tasks: agent readiness score was assessed and printed when subagent routing is uncertain"
        condition: "size in [medium, large, mega]"
        on_fail: "Run agent readiness check when delegation choice is material; otherwise record direct execution/fallback rationale"

  # ─────────────────────────────────────────────
  # DISCOVER → DECOMPOSE (medium+ only)
  # ─────────────────────────────────────────────
  - phase: DECOMPOSE
    checkpoint_start: "--- PHASE: DECOMPOSE ---"
    checkpoint_end: "--- PHASE: DECOMPOSE COMPLETE ---"
    condition: "size in [medium, large, mega]"
    exit_assertions:

      - id: DC1
        check: "Slice manifest exists with one or more smallest iterable slices; if there is exactly one slice, the manifest includes a single-slice rationale"
        on_fail: "Dispatch Architect to produce a strict slice manifest or add a single-slice rationale when one verified slice is the smallest correct decomposition"

      - id: DC2
        check: "Each slice has slice_id, name, observable_increment, deliverable_type, acceptance_criteria, files_to_create, files_to_modify, files_to_test, enabling_changes_included, depends_on, verification_command, expected_success_signal, evidence_to_record, and deviation_rollback_rule"
        on_fail: "Rewrite the Decompose output into the strict slice schema before entering Plan"

      - id: DC3
        check: "Slices are ordered by dependency — independent slices first and dependent slices after every depends_on prerequisite"
        on_fail: "Reorder slices so prerequisites come before dependents"

      - id: DC4
        check: "No circular dependencies exist between slices"
        on_fail: "Merge circularly dependent work into the smallest single iterable slice that can be verified"

      - id: DC5
        check: "No slice is layer-only, module-only, folder-only, feature-only, setup-only, contract-only, or broad component-style unless it produces a verified deliverable artifact with deliverable_type, acceptance criteria, verification command, and expected success signal"
        on_fail: "Convert broad layer/module/folder/feature/component or setup-only work into a smallest observable deliverable slice, or merge it into the slice that uses it"

      - id: DC6
        check: "Slice decomposition was produced by Architect subagent when subagent_execution_mode=delegated, or produced directly in fallback mode with equivalent criteria and evidence"
        condition: "size in [medium, large, mega]"
        on_fail: "Produce slice decomposition using delegated execution or direct fallback; record subagent_policy_state, subagent_execution_mode, and which path was used"

      - id: DC7
        check: "Saved clarification state is ready, clarification_defaults_applied is explicit (true/false), and unresolved clarification topics are empty before proceeding"
        on_fail: "Return to Discover and persist clarification_status=ready, clarification_defaults_applied explicit true/false, and unresolved clarification topics empty before continuing"

      - id: DC8
        check: "For medium+ tasks: decomposition_plan_review exists and decision is proceed after checking broad_split_rejection proof, scope understanding, slice/subagent count sanity, step/cost budget, dependency order, output-plan match, and fallback path"
        condition: "size in [medium, large, mega]"
        on_fail: "Load references/decomposition-plan-review.md, add explicit broad_split_rejection proof that broad layer/module/folder/feature/setup/contract/component splits were rejected unless they are verified deliverable artifact slices, repair the slice/subagent plan, and do not enter Plan until the review decision is proceed"

  # ─────────────────────────────────────────────
  # DECOMPOSE → PLAN (or PLAN directly for small)
  # ─────────────────────────────────────────────
  - phase: PLAN
    checkpoint_start: "--- PHASE: PLAN ---"
    checkpoint_end: "--- PHASE: PLAN COMPLETE (approved) --- for approved medium+ plans; --- PHASE: PLAN COMPLETE --- for no-wait small plans"
    exit_assertions:

      - id: P_ARTIFACT_CONTRACT
        check: "Plan includes artifact_contract before task packets with artifact type, required files/deliverables, output format/schema, acceptance criteria, verification command/method, expected success signal, owner/consumer, and non-goals/exclusions"
        on_fail: "Load references/artifact-first-output-contract.md and add the Artifact Contract before planning implementation steps"

      - id: P_VERIFIED_DISTILLATION
        check: "When promoting a workflow or review lesson into durable skill/constraint/eval knowledge: verified_skill_distillation exists and verifier_result is approved before durable files are written"
        on_fail: "Load references/verified-skill-distillation.md and obtain verifier approval before skill/constraint/eval promotion"

      - id: P1
        check: "Plan contains ordered implementation steps or task packets, each with exact file paths to create, modify, and test; for medium+ tasks the plan consumes the approved slice manifest from Decompose without rediscovering boundaries"
        on_fail: "Add exact create/modify/test file paths to every implementation step or task packet, and carry the approved slice manifest forward for medium+ tasks"

      - id: P2
        check: "Each implementation step or task packet has behavior/acceptance criteria and associated test criteria describing what to verify"
        on_fail: "Add behavior/acceptance criteria and test criteria to steps or task packets missing them"

      - id: P4
        check: "For medium+ tasks, user explicitly said 'approved' or 'approved with changes' to the plan, including the slice manifest. For small tasks, the inline plan was printed and either no-wait eligibility was recorded or approval was requested for risk/ambiguity."
        on_fail: "For medium+ tasks, present the full plan including slice manifest and wait for approval. For small tasks, record why the inline plan can proceed without waiting or request approval when risk/ambiguity requires it."

      - id: P5
        check: "Plan tier matches task size (inline for small, standard for medium, full for large/mega)"
        on_fail: "Upgrade or downgrade plan tier to match size"

      - id: P6
        check: "For large/mega tasks: Security and Operability sections are populated"
        condition: "size in [large, mega]"
        on_fail: "Fill Security and Operability sections per plan-template.md"

      - id: P7
        check: "For large+ tasks: implementation blueprint was produced by Architect subagent when subagent_execution_mode=delegated, or produced directly in fallback mode with equivalent architectural analysis"
        condition: "size in [large, mega]"
        on_fail: "Produce implementation blueprint using delegated execution or direct fallback; record subagent_policy_state, subagent_execution_mode, and which path was used"

      - id: P8
        check: "If clarification state was persisted for this task: saved clarification state is ready, clarification_defaults_applied is explicit (true/false), and unresolved clarification topics are empty before proceeding"
        on_fail: "Return to Discover and persist clarification_status=ready, clarification_defaults_applied explicit true/false, and unresolved clarification topics empty before continuing"

      - id: P_PATTERN_RETRIEVAL
        check: "When editing framework skills, contracts, evals, hooks, templates, or workflow patterns: pattern_retrieval_note records real local search queries or paths, canonical pattern path used, and counterexample/edge case path checked or explicit no-pattern rationale"
        condition: "task touches framework skills, contracts, evals, hooks, templates, or workflow patterns"
        on_fail: "Search local repo for similar patterns and record Pattern Retrieval before implementation; placeholders such as [paths/queries] or N/A without rationale do not satisfy this gate"

      - id: P9
        check: "For medium+ tasks: implementation work is represented as executable task packets using plan-template.md and aligned one-to-one with approved Decompose slices"
        condition: "size in [medium, large, mega]"
        on_fail: "Rewrite vague implementation steps into executable task packets that consume slice_id and slice manifest fields directly"

      - id: P10
        check: "Each implementation step or task packet has a verification command and expected success signal"
        on_fail: "Add an exact verification command and expected success signal to each step or task packet"

      - id: P11
        check: "Each task packet includes a deviation/rollback rule, or small inline plan explicitly states how deviations are handled"
        on_fail: "Add deviation/rollback handling before seeking plan approval"

      - id: CS1
        check: "When search_mode == candidate_search: goal tree decomposes the existing acceptance criteria and slice acceptance/verification criteria"
        condition: "search_mode == candidate_search"
        on_fail: "Load references/candidate-search.md and rewrite the goal tree from approved criteria instead of creating a second source of truth"

      - id: CS2
        check: "When search_mode == candidate_search: candidate archive exists at {agent_state_dir}/candidate-search.md when local state artifacts are configured and policy-allowed, or is carried inline in the plan/task packet"
        condition: "search_mode == candidate_search"
        on_fail: "Create the candidate archive in configured local state when allowed; otherwise embed the archive in the plan/task packet with redaction and retention notes"

      - id: CS3
        check: "When search_mode == candidate_search: candidates are scored with the pre-code rubric: objective fit, verifiability, feasibility, risk, and simplicity"
        condition: "search_mode == candidate_search"
        on_fail: "Score each candidate using references/candidate-search.md before selecting an approach"

      - id: CS4
        check: "Post-approval candidate pivots are recorded as plan deviations and re-approved when scope, files, behavior, or risk changes"
        condition: "search_mode == candidate_search"
        on_fail: "Print the plan deviation, update plan_deviation, and wait for user approval before Build continues"

      - id: CS5
        check: "When search_mode == candidate_search: candidate_search_result includes search_exit_summary with candidate budget, candidates considered, exit reason, and empty-result handling"
        condition: "search_mode == candidate_search"
        on_fail: "Add search_exit_summary before Plan completes so the search cannot be mistaken for an unbounded or silently exhausted loop"

    guidance_assertions:

      - id: P3
        severity: guidance
        check: "Risks section is populated — at minimum 'Low risk: single-file change' for small tasks"
        on_fail: "Add risks section when risk is non-obvious; small obvious changes may state low-risk inline"

  # ─────────────────────────────────────────────
  # DESIGN → BUILD (UI tasks only)
  # ─────────────────────────────────────────────
  - phase: DESIGN
    checkpoint_start: "--- PHASE: DESIGN ---"
    checkpoint_end: "--- PHASE: DESIGN COMPLETE (approved) ---"
    condition: "phases list includes DESIGN"
    exit_assertions:

      - id: DS1
        check: "Visual mockup was presented to user"
        on_fail: "Create and present mockup before proceeding"

      - id: DS2
        check: "User explicitly approved the design"
        on_fail: "Wait for design approval"

      - id: DS3
        check: "Design direction proposal was produced by Architect subagent when subagent_execution_mode=delegated, or produced directly in fallback mode before mockup creation"
        on_fail: "Produce design direction using delegated execution or direct fallback; record subagent_policy_state, subagent_execution_mode, and which path was used"

  # ─────────────────────────────────────────────
  # BUILD → REVIEW
  # ─────────────────────────────────────────────
  - phase: BUILD
    checkpoint_start: "--- PHASE: BUILD ---"
    checkpoint_end: "--- PHASE: BUILD COMPLETE ---"
    exit_assertions:

      - id: B1
        check: "Every plan step has a corresponding '>> Step N/total: DONE' message"
        on_fail: "Complete remaining plan steps before entering Review"

      - id: B2
        check: "Build command succeeded (exit code 0 or equivalent success)"
        on_fail: "Fix build errors. Do not enter Review with a broken build."

      - id: B3
        check: "At least one relevant verification exists and passed: runnable tests for code changes, or documented validation_results for docs/no-op/discovery/non-runnable workflows"
        on_fail: "Add or run an appropriate verification and record a passing result before proceeding"

      - id: B3A
        check: "Unknown-cause bugfixes completed assistant-debugging or recorded a concrete debugging blocker before implementation; no random patching occurred before reproduction/root-cause evidence"
        condition: "task_type == bugfix and debugging_mode in [root_cause_unknown, completed, blocked]"
        on_fail: "Return to assistant-debugging: reproduce or record blocker, evaluate hypotheses, and identify root cause or mitigation target before patching."

      - id: B4
        check: "All tests pass (0 failures)"
        on_fail: "Fix failing tests before entering Review"

      - id: B5
        check: "No plan deviations occurred silently — all were flagged via '>> PLAN DEVIATION DETECTED'"
        on_fail: "If any code diverges from the plan, print the deviation message and get resolution"

      - id: B6
        check: "For medium+ tasks: task journal or equivalent carried-forward state is updated with progress for all completed steps"
        condition: "size in [medium, large, mega]"
        on_fail: "Update the configured task journal when available, or the carried-forward task state packet when local state artifacts are unavailable/disallowed"

      - id: B12
        check: "For medium+ tasks: every slice's acceptance and verification criteria from DECOMPOSE phase are independently checked, passing, and recorded with command/result evidence in the task journal, validation_results, or equivalent carried-forward slice ledger"
        condition: "size in [medium, large, mega]"
        on_fail: "Run verification criteria for each slice, record command/result evidence in the configured task journal or equivalent carried-forward state, and fix failing criteria before proceeding to Review."

      - id: B_SUBAGENT_EVIDENCE
        check: "For source-changing Build tasks: subagent_execution_mode is not not_applicable, required_agents includes Code Writer, Builder/Tester, and Reviewer, and the task journal Agent Dispatch Log records strict delegated dispatch/result evidence or explicit direct fallback role-equivalent evidence"
        on_fail: "Update the Agent Dispatch Log before leaving Build. delegated mode requires Code Writer, Builder/Tester, and Reviewer dispatch/result evidence. direct_fallback requires reason authorization_denied, subagents_unavailable, or policy_disallowed plus Code Writer, Builder/Tester, and Reviewer direct evidence."

      - id: B_SUBAGENT_SLICE_EVIDENCE
        check: "For medium+ delegated tasks with slices: per-slice dispatch evidence is recorded before the slice is marked VERIFIED"
        condition: "size in [medium, large, mega] and subagent_execution_mode == delegated"
        on_fail: "Add per-slice Code Writer and Builder/Tester dispatch/result evidence to the Agent Dispatch Log or slice ledger before proceeding."

      - id: B13
        check: "For medium+ tasks: each slice has a final status of VERIFIED, including self-check result, before the next slice started"
        condition: "size in [medium, large, mega]"
        on_fail: "This is a process violation — slices must be verified sequentially with evidence before advancing. Note it in the configured task journal or equivalent carried-forward state."

    guidance_assertions:

      - id: B7
        severity: guidance
        check: "Tests were written alongside code, not in a batch after all implementation"
        on_fail: "If batching happened, note it as process debt and ensure regression evidence still proves the behavior"

      - id: B8
        severity: guidance
        check: "SOLID principles checklist was evaluated for each implementation step (SRP for small, SRP+OCP+DIP for medium, full SOLID for large/mega per references/prompts/solid-principles.md)"
        on_fail: "Load references/prompts/solid-principles.md when design risk is material; otherwise use code review to catch concrete violations"

      - id: B9
        severity: blocker
        check: "Implementation was performed by Code Writer subagent when subagent_execution_mode=delegated, or directly in fallback mode with the same plan/deviation/verification evidence"
        on_fail: "Record Code Writer dispatch/result evidence or Code Writer direct fallback evidence before Review"

      - id: B10
        severity: blocker
        check: "Build/test/validation was performed by Builder/Tester subagent when subagent_execution_mode=delegated, or directly in fallback mode with equivalent command/result evidence"
        on_fail: "Record Builder/Tester dispatch/result evidence or Builder/Tester direct fallback evidence before Review"

      - id: B11
        severity: blocker
        check: "For medium+ tasks with subagent_execution_mode=delegated: Code Writer and Builder/Tester were dispatched per slice; otherwise direct fallback processed slices sequentially with equivalent evidence"
        condition: "size in [medium, large, mega]"
        on_fail: "Prefer slice-level execution when it reduces risk; do not block direct sequential work with equivalent verification"

  # ─────────────────────────────────────────────
  # REVIEW → DOCUMENT
  # ─────────────────────────────────────────────
  - phase: REVIEW
    checkpoint_start: "--- PHASE: REVIEW ---"
    checkpoint_end: "--- PHASE: REVIEW COMPLETE ---"
    exit_assertions:

      - id: R1
        check: "Structured Spec Review completed by loading and following references/prompts/spec-review.md; latest Spec Review entry has Result: PASS and records missing acceptance criteria, extra scope, changed files mismatch, verification evidence mismatch, and required fixes"
        on_fail: "Run Stage 1 Spec Review using references/prompts/spec-review.md, record the structured spec compliance result, fix any FAIL items, and re-run until Result: PASS before quality review."

      - id: R1A
        check: "Quality Review entries do not substitute for Spec Review; Stage 1 spec compliance result is present before Stage 2 quality review starts"
        on_fail: "Run the distinct Spec Review first. Do not count assistant-review, Quality Review, or legacy Review entries as spec compliance."

      - id: R2
        check: "Quality Review completed by loading and following assistant-review SKILL.md and contracts (not manual review)"
        on_fail: "Load and follow assistant-review SKILL.md and contracts. Do not manually dispatch reviewers."

      - id: R3
        check: "Verification summary is written with: changed files, test/validation coverage, review result, manual validation steps when applicable, known limitations"
        on_fail: "Write verification summary in the configured task journal, output contract, or equivalent carried-forward state"

      - id: R3A
        check: "For bugfixes, review material includes reproduction/root-cause evidence or an explicit not_applicable/blocker rationale, and verifies that regression coverage follows from that evidence"
        condition: "task_type == bugfix"
        on_fail: "Add debugging evidence to the review material or downgrade confidence/status before final review."

      - id: R4
        check: "User confirmed 'looks good' or equivalent approval"
        on_fail: "Present verification summary and wait for user confirmation"

      - id: R5
        check: "For medium+ tasks: task journal, output contract, or equivalent carried-forward review state has Final Result entry"
        condition: "size in [medium, large, mega]"
        on_fail: "Write Final Result entry in the configured task journal or equivalent carried-forward review state"

    guidance_assertions:

      - id: R6
        severity: strict_only
        check: "For medium+ tasks: rubric scores present in Quality Review entries (Rubric: and Weighted: lines)"
        condition: "size in [medium, large, mega]"
        on_fail: "Re-run quality review with rubric_required=true per references/review-rubric.md. If a local hook is configured/policy-allowed it may enforce this structurally; otherwise enforce manually before completion."

      - id: R7
        severity: strict_only
        check: "For medium+ tasks: final rubric weighted score >= 3.0 (minimum completion threshold)"
        condition: "size in [medium, large, mega]"
        on_fail: "Weighted score below 3.0 — the code needs significant improvement. Fix lowest-scoring dimensions and re-review. If a local hook is configured/policy-allowed it may enforce this structurally; otherwise enforce manually before completion."

  # ─────────────────────────────────────────────
  # DOCUMENT → COMPLETE
  # ─────────────────────────────────────────────
  - phase: DOCUMENT
    checkpoint_start: "--- PHASE: DOCUMENT ---"
    checkpoint_end: "--- PHASE: DOCUMENT COMPLETE ---"
    exit_assertions:

      - id: DOC1
        check: "Relevant documentation was updated OR explicitly noted as unnecessary with reason"
        condition: "size in [medium, large, mega]"
        on_fail: "Review what documentation needs updating (README, CHANGELOG, code comments)"

      - id: DOC2
        check: "Metrics JSONL entry was appended when local metrics are configured and policy-allowed; otherwise metrics_unavailable_or_disallowed is recorded in the output/final response"
        on_fail: "Append metrics when configured and allowed, or explicitly record why metrics were skipped"

      - id: DOC_SKILL_DISTILLATION
        check: "If work produced a repeatable workflow, recurring lesson, user-requested reusable procedure, or skill/constraint candidate: verified_skill_distillation exists and verifier_result is approved before promotion, or promotion_decision is skip with rationale"
        on_fail: "Load references/verified-skill-distillation.md, create the distillation packet, and send it to an independent verifier before saving any reusable skill or constraint"

      - id: DOC3
        check: "'--- WORKFLOW COMPLETE ---' is only printed AFTER all DOCUMENT assertions pass"
        on_fail: "Do not print workflow complete until all document assertions pass"

      - id: DOC4
        check: "If no task journal/equivalent state exists, or explicit non-standard handoff is requested: context_handoff_packet preserves pinned context, summarizes compressible context, prunes stale/unsafe residue, and names the exact next action"
        on_fail: "Create or repair the context_handoff_packet using references/context-handoff-templates.md before ending the session"

# ─────────────────────────────────────────────
# Cross-phase invariants
# These must hold true throughout the entire workflow, not just at gates.
# ─────────────────────────────────────────────
invariants:
  - id: INV1
    check: "Constraints list is never reduced — only grows. Removing a constraint requires explicit user instruction."
    scope: all_phases
    on_fail: "Print '>> CONSTRAINT REMOVED — review with user before proceeding' and restore the removed constraint"

  - id: INV2
    check: "No phase is skipped that the size-to-phases mapping requires"
    scope: all_phases
    on_fail: "Print '>> PHASE SKIPPED — run the missing phase before continuing' and execute the skipped phase"

  - id: INV3
    check: "Every phase prints its start checkpoint before any work and its end checkpoint after assertions pass"
    scope: all_phases
    on_fail: "Re-print the missing checkpoint marker and note the skipped protocol step in the configured task journal or equivalent carried-forward state"

  - id: INV4
    check: "If scope grows beyond initial triage during any phase, stop and re-triage"
    scope: all_phases
    on_fail: "Print '>> SCOPE CHANGE DETECTED' and re-run Triage with updated understanding"

# Research Phase Gate Contracts
# Research has a search → synthesize → verify pipeline.
# Gates ensure each stage completes before the next begins.

schema_version: "1.0"
contract: phase-gates
skill: assistant-research

gates:

  # ─────────────────────────────────────────────
  # SEARCH → SYNTHESIZE
  # ─────────────────────────────────────────────
  - phase: SEARCH
    checkpoint_start: "--- PHASE: SEARCH ---"
    checkpoint_end: "--- PHASE: SEARCH COMPLETE ---"
    exit_assertions:

      - id: S1
        check: "Evidence budget matches tier: quick=1 authoritative source or 2 weak sources, standard=3 differentiated research angles, extensive=3+ angles with 2+ credible sources per major claim, deep=iterative until sources stop changing the answer"
        on_fail: "Adjust research depth to match the selected tier or downgrade confidence for unsupported claims"

      - id: S2
        check: "For standard tier: 3 differentiated angles were covered (direct evidence, alternative perspective, counter-evidence)"
        condition: "tier == standard"
        on_fail: "Search differentiated angles instead of duplicate queries; use subagents only when the active adapter and user/tool policy permit delegation"

      - id: S3
        check: "For extensive tier: at least 3 research angles were identified before searching"
        condition: "tier == extensive"
        on_fail: "Generate research angles via structured thinking before searching or delegating"

      - id: S4
        check: "Raw search results are available for synthesis — not discarded prematurely"
        on_fail: "Retain all search results until synthesis is complete"

      - id: S5
        check: "For five_lens_briefing: the five required lenses were covered before synthesis (practitioner, academic/technical expert, skeptic, economist/incentives analyst, historian/pattern matcher)"
        condition: "research_method == five_lens_briefing"
        on_fail: "Read five-lens-briefing.md and complete the missing lenses before synthesizing"

      - id: S6
        check: "For five_lens_briefing: lens inferences are separated from source-backed findings and weakly sourced lens claims are marked LOW confidence"
        condition: "research_method == five_lens_briefing"
        on_fail: "Label unsourced lens inferences as LOW confidence or gather sources before upgrading confidence"

      - id: S7
        check: "For five_lens_briefing: each required lens has at least one perspective-guided research question, a source-grounded answer or explicit gap, source notes/verified URLs, one follow-up question, and evidence status before contradiction mapping"
        condition: "research_method == five_lens_briefing"
        on_fail: "Build the question trace/evidence ledger from five-lens-briefing.md before moving to contradiction mapping or synthesis"

  # ─────────────────────────────────────────────
  # SYNTHESIZE → VERIFY
  # ─────────────────────────────────────────────
  - phase: SYNTHESIZE
    checkpoint_start: "--- PHASE: SYNTHESIZE ---"
    checkpoint_end: "--- PHASE: SYNTHESIZE COMPLETE ---"
    exit_assertions:

      - id: SY1
        check: "Findings are cross-validated — claims appearing in multiple sources get higher confidence"
        on_fail: "Compare findings across sources before assigning confidence levels"

      - id: SY2
        check: "Conflicting information is identified and assessed — not silently ignored"
        on_fail: "Check for contradictions between sources and document in conflicts[]"

      - id: SY3
        check: "Gaps are identified — what couldn't be found or verified is documented"
        on_fail: "Review what was asked vs. what was found. Document the delta in gaps[]"

      - id: SY4
        check: "Each finding has a confidence level assigned based on source count and quality"
        on_fail: "Assign confidence levels per the HIGH/MEDIUM/LOW criteria in output contract"

      - id: SY5
        check: "For five_lens_briefing: a question trace/evidence ledger exists before the contradiction map and synthesis, and unresolved or inference-only answers are not presented as source-backed findings"
        condition: "research_method == five_lens_briefing"
        on_fail: "Add or repair the question trace/evidence ledger and downgrade unsupported answers before synthesizing"

      - id: SY6
        check: "For five_lens_briefing: a contradiction map exists before the synthesis and names conflicts, consensus, unresolved question, and missing angle"
        condition: "research_method == five_lens_briefing"
        on_fail: "Create the contradiction map before writing the synthesis"

      - id: SY7
        check: "For five_lens_briefing: the synthesis uses all five lenses, the question trace/evidence ledger, and includes a peer review/self-critique before presentation"
        condition: "research_method == five_lens_briefing"
        on_fail: "Revise the synthesis with all lenses and run the peer review step from five-lens-briefing.md"

  # ─────────────────────────────────────────────
  # VERIFY → PRESENT
  # ─────────────────────────────────────────────
  - phase: VERIFY
    checkpoint_start: "--- PHASE: VERIFY ---"
    checkpoint_end: "--- PHASE: VERIFY COMPLETE ---"
    exit_assertions:

      - id: VR1
        check: "Every URL to be presented to the user has been verified as accessible"
        on_fail: "Verify URLs via fetch/head request. Remove or flag unverified URLs."

      - id: VR2
        check: "No AI-hallucinated URLs are included — every URL came from a search result"
        on_fail: "Remove any URL not found in search results. AI agents routinely hallucinate plausible URLs."

      - id: VR3
        check: "Low-confidence findings are explicitly flagged in the output"
        on_fail: "Add explicit LOW confidence labels to single-source or conflicting findings"

# ─────────────────────────────────────────────
# Research invariants
# ─────────────────────────────────────────────
invariants:
  - id: INV1
    check: "No unverified URL is ever presented to the user"
    scope: all_phases
    on_fail: "Verify or remove the URL. Dead links erode trust."

  - id: INV2
    check: "Confidence levels are evidence-based, not assumed — single source cannot be HIGH"
    scope: all_phases
    on_fail: "Downgrade confidence to match actual source count and quality"

  - id: INV3
    check: "The output follows the structured format defined in output.yaml — not free-form prose"
    scope: all_phases
    on_fail: "Reformat output to match the required FINDINGS/CONFLICTS/GAPS structure"

  - id: INV4
    check: "Subagent dispatch is optional and adapter-aware; research angles and evidence diversity remain required when delegation is unavailable"
    scope: all_phases
    on_fail: "Run the missing research angles sequentially and record that delegation was unavailable"

  - id: INV5
    check: "For five_lens_briefing, the final recommendation is not stronger than the verified evidence and peer review support"
    scope: all_phases
    on_fail: "Downgrade the recommendation, mark investigate_further, or verify the decision-critical claims before finalizing"

  - id: INV6
    check: "For finance/trading, legal, medical, safety-critical, or similarly high-impact topics, the output is framed as educational due diligence with risk/context caveats and defaults to investigate_further unless verified evidence, explicit user context, and peer review support a stronger recommendation"
    scope: all_phases
    on_fail: "Add high-stakes caveats and downgrade the recommendation to investigate_further unless the stronger recommendation is explicitly justified"

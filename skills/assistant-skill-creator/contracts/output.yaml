# Assistant Skill Creator Output Contract
# All artifacts must exist before printing --- PHASE: VALIDATE COMPLETE ---

schema_version: "1.0"
contract: output
skill: assistant-skill-creator

artifacts:
  - name: skill_md
    type: file
    required: true
    description: "SKILL.md entry point with YAML frontmatter (name, description, triggers) and markdown body"
    path: "skills/{skill_name}/SKILL.md"
    validation: "Must contain valid YAML frontmatter with name, description, and triggers fields. Body must be under 500 lines."
    on_fail: "Fix the SKILL.md — add missing frontmatter fields or trim body length"

  - name: input_contract
    type: file
    required: true
    description: "Input contract YAML defining fields the skill needs to start"
    path: "skills/{skill_name}/contracts/input.yaml"
    validation: "Must have schema_version, contract, skill headers. Every required field must have on_missing action."
    on_fail: "Add missing on_missing actions to required fields"

  - name: output_contract
    type: file
    required: true
    description: "Output contract YAML defining artifacts the skill must produce"
    path: "skills/{skill_name}/contracts/output.yaml"
    validation: "Must have schema_version, contract, skill headers. Every required artifact must have on_fail action."
    on_fail: "Add missing on_fail actions to required artifacts"

  - name: phase_gates_contract
    type: file
    required: conditional
    condition: "skill_category is process or analysis"
    description: "Phase gates YAML defining binary assertions at each phase transition"
    path: "skills/{skill_name}/contracts/phase-gates.yaml"
    validation: "Must have at least one gate per phase. Assertions must be binary (pass/fail). Corrective actions must be actionable."
    on_fail: "Add missing phase gates or fix non-binary assertions"

  - name: handoffs_contract
    type: file
    required: conditional
    condition: "skill_category is process"
    description: "Handoffs YAML defining data shapes between subagent dispatch and return"
    path: "skills/{skill_name}/contracts/handoffs.yaml"
    validation: "Producer return_fields must satisfy consumer context_fields. All fields must be typed."
    on_fail: "Fix field mismatches between producer and consumer schemas"

  - name: validation_summary
    type: string
    required: true
    description: "Summary of validation results against the contract design guide rules and company-safe/agent-agnostic checks"
    validation: "Must report pass/fail for all contract rules plus policy/runtime checks. No failures allowed in final output."
    on_fail: "Fix failing rules and re-validate"

  - name: policy_safety_summary
    type: string
    required: true
    description: "How the skill handles memory, metrics, hooks, subagents, state paths, external tools, and sensitive examples"
    validation: "Must state either 'none used' or describe the optional/configurable fallback for each runtime/tooling assumption"
    on_fail: "Add policy gates or fallback behavior before finalizing the skill"


  - name: distillation_verification
    type: object
    required: conditional
    condition: "creating or updating a skill from a completed workflow, review lesson, reusable procedure, or user-requested skill save"
    description: "Verifier-approved distillation packet proving the skill should be saved"
    validation: "verifier_result must be approved and the full distillation packet must be present before skill files are written"
    on_fail: "Load references/verified-skill-distillation.md and request verifier approval or return revision checklist before writing the skill"
    object_fields:
      - name: candidate_workflow
        type: string
        required: true
      - name: inputs
        type: string[]
        required: true
      - name: process_steps
        type: string[]
        required: true
      - name: output_artifact
        type: string
        required: true
      - name: verification_gate
        type: string
        required: true
      - name: learned_constraints
        type: string[]
        required: true
      - name: scope_and_non_goals
        type: string
        required: true
      - name: evidence
        type: string
        required: true
      - name: verifier_result
        type: enum
        enum_values: [approved, rejected, needs_revision]
        required: true
      - name: promotion_decision
        type: enum
        enum_values: [create_skill, update_skill, add_constraint, skip]
        required: true

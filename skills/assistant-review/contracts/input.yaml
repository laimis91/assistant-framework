# Review Input Contract
# Resolve these fields before entering the review loop.
# The agent determines scope from user request context, git state, or task journal.

schema_version: "1.0"
contract: input
skill: assistant-review

fields:
  - name: review_scope
    type: enum
    required: true
    enum_values: [files, diff, task, pr]
    description: "What to review — specific files, uncommitted diff, task journal changes, or a PR"
    on_missing: infer
    infer_from: >
      User specified files → files.
      Uncommitted changes exist (git diff non-empty) → diff.
      Active task journal (.claude/task.md) exists → task.
      User provided PR number/URL → pr.
      None of the above → ask.

  - name: diff_content
    type: string
    required: true
    description: "The actual diff to review — full text of changes"
    validation: "Non-empty. Must contain actual code changes, not just whitespace."
    on_missing: fail
    notes: "Generated from review_scope: git diff, git diff for task files, or PR diff"

  - name: scope_size
    type: enum
    required: true
    enum_values: [trivial, small, medium, large]
    description: "Size of the change — determines whether subagents are dispatched"
    on_missing: infer
    infer_from: >
      1-2 files, < 50 lines changed → trivial.
      1-3 files, < 200 lines changed → small.
      4-10 files, < 500 lines changed → medium.
      10+ files or 500+ lines → large.

  - name: mode
    type: enum
    required: true
    enum_values: [review-fix, audit]
    description: "review-fix: autonomous loop that fixes issues. audit: report only, no fixes."
    default: review-fix
    on_missing: infer
    infer_from: "User says 'audit', 'review only', 'just review', 'don't fix' → audit. Otherwise → review-fix."

  - name: task_journal_path
    type: string
    required: false
    description: "Path to active task journal, if one exists"
    default: null
    validation: "File exists at the specified path"
    notes: "When present, review findings are appended to the journal's Review Log"

  - name: previously_fixed
    type: object[]
    required: false
    description: "Items already fixed in prior review invocations (carries over from workflow Phase 5)"
    default: []
    object_fields:
      - name: description
        type: string
        required: true
      - name: fixed_in_round
        type: int
        required: true

# Validation behavior:
# 1. Resolve review_scope and diff_content before entering the loop
# 2. If diff_content is empty after resolution, inform user "nothing to review" and exit
# 3. Log resolved input as: >> Review scope: {scope_size} | mode: {mode} | files: {count}

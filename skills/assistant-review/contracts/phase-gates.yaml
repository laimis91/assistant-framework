# Review Phase Gate Contracts
# The review loop has 4 steps per round plus entry and exit conditions.
# These gates enforce correct sequencing within each round and across the loop.

schema_version: "1.0"
contract: phase-gates
skill: assistant-review

gates:

  # ─────────────────────────────────────────────
  # ENTRY — before the loop starts
  # ─────────────────────────────────────────────
  # Review phases are loop steps within a single workflow REVIEW phase.
  # The workflow's REVIEW checkpoint wraps them, so per-step checkpoints are null.
  - phase: ENTRY
    checkpoint_start: null
    checkpoint_end: null
    exit_assertions:

      - id: E1
        check: "review_scope is resolved to one of: files, changes, task, pr, content"
        on_fail: "Determine scope from git state and task journal, or ask user"

      - id: E2
        check: "review_material_snapshot.material is non-empty — there is actual material to review"
        on_fail: "Inform user 'nothing to review' and exit without entering the loop"

      - id: E3
        check: "scope_size is determined (trivial, small, medium, large)"
        on_fail: "Count files and lines changed to determine scope_size"

      - id: E4
        check: "mode is resolved (review-fix or audit)"
        on_fail: "Default to review-fix unless user explicitly requested audit"

      - id: E5
        check: "change_kind, semantic_contract_review_required, behavioral_contract_review_required, and agentic_loop_safety_review_required are resolved before review starts"
        on_fail: "Infer change_kind from touched paths/material; set semantic_contract_review_required=true for skill/workflow/framework changes, behavioral_contract_review_required=true for behavior-bearing code changes, and agentic_loop_safety_review_required=true for autonomous/repeated loop changes"

      - id: E6
        check: "subagent_policy_state, subagent_execution_mode, and subagent_authorization_scope are resolved before any Reviewer subagent dispatch"
        on_fail: "Resolve the active adapter/tool policy. Ask once when explicit authorization is required, or set direct_fallback/not_applicable and record why no Reviewer subagent will be spawned."

      - id: E7
        check: "If qa_evaluation_mode is required: Done Contract with debate_record when available, acceptance_criteria, verification_evidence, domain_context/rubric_refs when applicable, and qa_filter_policy are resolved before QAEvaluator dispatch"
        condition: "qa_evaluation_mode == required"
        on_fail: "Load references/qa-evaluation-loop.md, gather acceptance material and verification evidence, select domain rubric scope only when acceptance criteria, Done Contract, domain_context, or rubric_refs require it, or mark QA blocked with open_questions before dispatching QAEvaluator."

  # ─────────────────────────────────────────────
  # REVIEW step — per round
  # ─────────────────────────────────────────────
  - phase: REVIEW_STEP
    checkpoint_start: null
    checkpoint_end: null
    exit_assertions:

      - id: RS1
        check: "For medium+ scope in delegated mode: a fresh Reviewer subagent was dispatched (not reusing prior context)"
        condition: "scope_size in [medium, large] and subagent_execution_mode == delegated"
        on_fail: "Dispatch a new Reviewer subagent with the current review material snapshot and previously_fixed list"

      - id: RS1A
        check: "For medium+ scope in direct fallback mode: review context was reset or isolated enough to reduce stale-context risk, and that fresh-context evidence is recorded"
        condition: "scope_size in [medium, large] and subagent_execution_mode == direct_fallback"
        on_fail: "Create a fresh review material snapshot, clear stale assumptions, record direct-fallback review evidence, and do not claim a Reviewer subagent was dispatched"

      - id: RS2
        check: "Reviewer or direct-fallback review context received: review_material_snapshot, round number, previously_fixed list, and finding_filter_policy"
        on_fail: "In delegated mode, re-dispatch with all required context fields per handoffs contract. In direct fallback mode, rebuild the fresh review context packet before continuing."

      - id: RS3
        check: "Reviewer or direct-fallback review returned: findings[], summary, verdict — all present"
        on_fail: "In delegated mode, re-dispatch Reviewer requesting the missing fields. In direct fallback mode, complete the missing review fields before evaluating."

      - id: RS4
        check: "No previously-fixed item was re-reported in findings"
        on_fail: "Filter out re-reported items before proceeding to EVALUATE"

      - id: RS5
        check: "For medium+ scope: rubric_scores is present in reviewer return with all 5 dimensions scored"
        condition: "scope_size in [medium, large]"
        on_fail: "In delegated mode, re-dispatch Reviewer with rubric_required=true. In direct fallback mode, score the fresh review context before continuing. Reference references/review-rubric.md for scoring instructions."

      - id: RS6
        check: "Reviewer or direct-fallback review applied the clean-code principle lens from references/review-principles.md: SOLID, KISS, DRY, YAGNI, and readability"
        on_fail: "In delegated mode, re-dispatch Reviewer with quality_principles_required=true and request principle_checks plus evidence-backed findings only. In direct fallback mode, complete principle_checks against the fresh review context."

      - id: RS7
        check: "When semantic_contract_review_required is true: Reviewer or direct-fallback review applied the Semantic Contract Review Checklist and returned semantic_contract_checks"
        condition: "semantic_contract_review_required is true"
        on_fail: "In delegated mode, re-dispatch Reviewer requesting semantic_contract_checks for inherited contracts, template-contract alignment, eval inheritance, external-method signature fidelity, high-stakes guards, and mirror-surface sync. In direct fallback mode, complete those semantic_contract_checks before declaring clean."

      - id: RS8
        check: "When behavioral_contract_review_required is true: Reviewer or direct-fallback review applied the Behavioral Contract Review Checklist and returned behavioral_contract_checks"
        condition: "behavioral_contract_review_required is true"
        on_fail: "In delegated mode, re-dispatch Reviewer requesting behavioral_contract_checks for existing invariants, interface-implementation alignment, inherited tests, protocol/algorithm fidelity, high-impact guards, and runtime-surface sync. In direct fallback mode, complete those behavioral_contract_checks before declaring clean."

      - id: RS9
        check: "When agentic_loop_safety_review_required is true: Reviewer or direct-fallback review applied the Agentic Loop Safety Checklist and returned agentic_loop_safety_checks"
        condition: "agentic_loop_safety_review_required is true"
        on_fail: "In delegated mode, re-dispatch Reviewer requesting agentic_loop_safety_checks for bounded execution, stop condition, retry/empty handling, tool-error handling, progress/stagnation detection, cost/token guardrails, and low-confidence escalation. In direct fallback mode, complete those agentic_loop_safety_checks before declaring clean."

      - id: RS_RULE_DISTILLATION
        check: "When blocker/must-fix findings or recurring contract/checklist/eval gaps exist: review_finding_rule_distillation classifies them as one_off_fix, permanent_rule_candidate, or no_action with evidence and promotion decision"
        on_fail: "Load references/review-finding-permanent-rule.md and classify applicable findings before final review output"

  # ─────────────────────────────────────────────
  # EVALUATE step — per round
  # ─────────────────────────────────────────────
  - phase: EVALUATE_STEP
    checkpoint_start: null
    checkpoint_end: null
    exit_assertions:

      - id: EV1
        check: "Exit decision is one of: EXIT_CLEAN, EXIT_ISSUES_FIXED, EXIT_MAX_ROUNDS, ESCALATE_PIVOT_RESTART, CONTINUE"
        on_fail: "Re-evaluate findings against exit criteria. EXIT_CLEAN = no must-fix/should-fix (nits OK, note in report) and, for medium+ scope, weighted_score >= 4.0. EXIT_ISSUES_FIXED = round 10, all issues fixed this session, no must-fix/should-fix findings, and, for medium+ scope, weighted_score >= 4.0. EXIT_MAX_ROUNDS = round 10 with remaining must-fix or should-fix findings. ESCALATE_PIVOT_RESTART = STAGNATION, repeated DRIFT, repeated REGRESSION, or rubric action PIVOT."

      - id: EV2
        check: "EXIT_CLEAN or EXIT_ISSUES_FIXED only if: zero must-fix AND zero should-fix findings, and for medium+ scope weighted_score >= 4.0"
        on_fail: "Findings exist or medium+ weighted_score is below 4.0 — apply rubric action first. REFINE continues to FIX; PIVOT escalates through pivot_restart_decision."

      - id: EV3
        check: "EXIT_MAX_ROUNDS only if: round == 10"
        on_fail: "Rounds remain — must CONTINUE to FIX step"

      - id: EV4
        check: "In audit mode: always EXIT after first round (no fix loop)"
        condition: "mode == audit"
        on_fail: "Audit mode does not fix or loop — present findings and exit"

      - id: EV5
        check: "For medium+ scope: rubric threshold action is applied — PASS exits, REFINE continues, PIVOT escalates through pivot_restart_decision"
        condition: "scope_size in [medium, large] and rubric_scores is present"
        on_fail: "Check rubric weighted_score against threshold table in references/review-rubric.md and apply the correct action"

      - id: EV6
        check: "PIVOT action triggers orchestrator-owned pivot_restart_decision — do not silently continue after PIVOT"
        condition: "rubric_scores.action == PIVOT"
        on_fail: "Create pivot_restart_signal and require the orchestrator to record pivot_restart_decision with trigger, evidence, affected_slice_or_round, options_considered, selected_action, reapproval_required, next_agent, recovery_pointer, and exact_next_action before another fix/review dispatch."

      - id: EV7
        check: "STAGNATION, repeated DRIFT, or repeated REGRESSION triggers ESCALATE_PIVOT_RESTART and records pivot_restart_signal before another fix/review dispatch"
        condition: "scope_size in [medium, large] and round >= 2"
        on_fail: "Pause the loop, build pivot_restart_signal from score_history, and require orchestrator-owned pivot_restart_decision. Do not advance to another review round until the decision names the exact next action."

  # ─────────────────────────────────────────────
  # FIX step — per round (review-fix mode only)
  # ─────────────────────────────────────────────
  - phase: FIX_STEP
    condition: "mode == review-fix"
    checkpoint_start: null
    checkpoint_end: null
    exit_assertions:

      - id: F1
        check: "ALL must-fix items were addressed (not just some)"
        on_fail: "Fix remaining must-fix items before proceeding"

      - id: F2
        check: "ALL should-fix items were addressed (fixed or explicitly deferred with reason)"
        on_fail: "Fix or defer remaining should-fix items — add deferred items to remaining_items with reason_unresolved populated"

      - id: F3
        check: "Each fixed item was added to previously_fixed with description and round number"
        on_fail: "Update previously_fixed list before proceeding to VALIDATE"

  # ─────────────────────────────────────────────
  # VALIDATE step — per round (review-fix mode only)
  # ─────────────────────────────────────────────
  - phase: VALIDATE_STEP
    condition: "mode == review-fix"
    checkpoint_start: null
    checkpoint_end: null
    exit_assertions:

      - id: V1
        check: "Build was run and passed (exit code 0)"
        on_fail: "Fix build errors before incrementing round"

      - id: V2
        check: "Tests were run and all pass (0 failures)"
        on_fail: "Fix failing tests before incrementing round"

      - id: V3
        check: "For C# projects: cognitive complexity analysis was run on changed files"
        condition: "project is C# and complexity tool is available"
        on_fail: "Run complexity analysis and flag methods exceeding threshold"

  # ─────────────────────────────────────────────
  # QA EVALUATION step — after code review/build evidence
  # ─────────────────────────────────────────────
  - phase: QA_EVALUATION_STEP
    condition: "qa_evaluation_mode == required"
    checkpoint_start: null
    checkpoint_end: null
    exit_assertions:

      - id: QA1
        check: "QA evaluation starts only after build/test verification evidence and Code Reviewer or Reviewer compatibility result are available"
        on_fail: "Return to validation or code review. Do not dispatch QAEvaluator until code-review/build evidence exists."

      - id: QA2
        check: "QAEvaluator received done_contract with debate_record when present, acceptance_criteria, verification_evidence, domain_context/rubric_refs when applicable, round, previously_failed_acceptance_items, and qa_filter_policy"
        on_fail: "Re-dispatch QAEvaluator with the full QA handoff context, or complete direct-fallback QA context before continuing."

      - id: QA3
        check: "QAEvaluator returned status, round, acceptance_findings, qa_scorecard, selected_domain_rubrics/domain_quality_scores when scoped domain rubrics were selected, final_verdict, result, evidence, and score_entry"
        on_fail: "In delegated mode, re-dispatch QAEvaluator requesting the missing fields. In direct fallback mode, complete the missing QA evidence before deciding acceptance. Require selected_domain_rubrics/domain_quality_scores only when domain rubrics are scoped."

      - id: QA4
        check: "QAEvaluator findings stay in the QA lane and do not replace code-reviewer findings"
        on_fail: "Move generic code/security/architecture/test-coverage findings back to Code Reviewer unless they directly block an acceptance criterion or Done Contract item."

      - id: QA5
        check: "QA loop exit decision is accepted, accepted_with_concerns, rejected, or blocked; round 10 is terminal and never starts round 11"
        on_fail: "Apply references/qa-evaluation-loop.md terminal behavior. If round < 10 and rejected, return failed acceptance items to Build; if round == 10, record remaining failed acceptance items in qa_evaluation_result."

      - id: QA6
        check: "Domain rubrics from references/domain-rubrics.md are loaded and applied only when scoped by acceptance criteria, Done Contract, domain_context, or explicit rubric_refs"
        condition: "qa_evaluation_mode == required"
        on_fail: "Remove unscoped rubric scoring, or re-dispatch QAEvaluator with the explicit domain_context/rubric_refs and require selected_domain_rubrics plus domain_quality_scores."

      - id: QA7
        check: "QA STAGNATION, repeated DRIFT, repeated REGRESSION, or scoped domain action pivot triggers pivot_restart_signal and orchestrator-owned pivot_restart_decision before another QA/build dispatch"
        condition: "qa_evaluation_mode == required"
        on_fail: "Pause QA, create pivot_restart_signal from score_entry, score_progression, or domain_quality_scores action=pivot, and require pivot_restart_decision with exact_next_action. Round 10 remains terminal and never starts round 11."

  # ─────────────────────────────────────────────
  # EXIT — after loop completes
  # ─────────────────────────────────────────────
  - phase: EXIT
    checkpoint_start: null
    checkpoint_end: null
    exit_assertions:

      - id: X1
        check: "Final summary is fully populated per output contract"
        on_fail: "Complete the final summary before presenting to user"

      - id: X2
        check: "If task journal exists: Review Log entry was appended with Final Result"
        condition: "task_journal_path is not null"
        on_fail: "Append Review Log entry to task journal"

      - id: X3
        check: "For medium+ scope: rubric_summary is populated in output with final scores and score progression"
        condition: "scope_size in [medium, large]"
        on_fail: "Populate rubric_summary with final_scores from last round and score_progression from all rounds"

      - id: X4
        check: "If qa_evaluation_mode is required: qa_evaluation_result is populated with final_verdict, result, acceptance_findings, qa_scorecard, score_progression, and evidence"
        condition: "qa_evaluation_mode == required"
        on_fail: "Run or complete the QA evaluation loop before presenting final review results."

# ─────────────────────────────────────────────
# Loop invariants
# ─────────────────────────────────────────────
invariants:
  - id: INV0
    check: "Only ONE summary is presented to the user — no intermediate results are shown during the loop"
    scope: all_rounds
    on_fail: "Do not print findings or summaries until the loop exits. Buffer all output for the final summary."

  - id: INV1
    check: "previously_fixed list only grows — items are never removed"
    scope: all_rounds
    on_fail: "Restore any removed items to previously_fixed. This list is append-only."

  - id: INV2
    check: "Finding filter policy requires file/line evidence, concrete impact, and the smallest useful fix; speculative concerns are non-blocking Observations; round 10 is terminal"
    scope: all_rounds
    on_fail: "Rebuild finding_filter_policy from the evidence-backed rule and hard max-10 cap before dispatching review."

  - id: INV3
    check: "The agent never pauses between rounds to ask the user — the loop is autonomous"
    scope: all_rounds
    on_fail: "This is the core violation of this skill. Continue the loop without waiting."

  - id: INV4
    check: "Each round finds fewer or equal issues than the previous round"
    scope: all_rounds
    on_fail: "Investigate whether fixes are introducing new problems. If issue count increased, document this in the final summary as a warning."

  - id: INV5
    check: "For medium+ scope: rubric score increases correlate with finding count decreases (no drift)"
    scope: all_rounds
    condition: "scope_size in [medium, large] and round >= 2"
    on_fail: >
      Drift detected: score increased without corresponding quality improvement.
      Per references/score-tracking.md: reset evaluator context once by dispatching a fresh Reviewer
      with stricter prompt; repeated DRIFT triggers pivot_restart_signal and orchestrator-owned
      pivot_restart_decision before another dispatch.

  - id: INV6
    check: "For medium+ scope: score does not stagnate (unchanged for 2+ rounds with findings present)"
    scope: all_rounds
    condition: "scope_size in [medium, large] and round >= 3"
    on_fail: >
      Stagnation detected: score unchanged for 2+ rounds while findings remain.
      Return pivot_restart_signal and require orchestrator-owned pivot_restart_decision before
      another fix/review dispatch.


  - id: INV7
    check: "For skill/workflow/framework changes, semantic contract review is not skipped or treated as a style-only review"
    scope: all_rounds
    condition: "semantic_contract_review_required is true"
    on_fail: "Run the Semantic Contract Review Checklist before declaring the review clean; report missing inherited artifacts, weak evals, method-signature drift, high-stakes guard gaps, or mirror drift as findings."


  - id: INV8
    check: "For behavior-bearing code changes, behavioral contract review is not skipped or treated as style-only review"
    scope: all_rounds
    condition: "behavioral_contract_review_required is true"
    on_fail: "Run the Behavioral Contract Review Checklist before declaring the review clean; report invariant bypasses, public-contract drift, weak inherited tests, protocol semantic gaps, missing high-impact guards, or runtime surface drift as findings."


  - id: INV9
    check: "For agent/workflow/tool loop changes, loop safety review is not skipped or treated as style-only review"
    scope: all_rounds
    condition: "agentic_loop_safety_review_required is true"
    on_fail: "Run the Agentic Loop Safety Checklist before declaring the review clean; report missing bounds, stop conditions, retry caps, empty-result handling, tool-error routing, stagnation detection, cost/token guards, or low-confidence escalation as findings."

  - id: INV_QA1
    check: "QA evaluation never replaces Code Reviewer or Reviewer compatibility review"
    scope: all_rounds
    condition: "qa_evaluation_mode == required"
    on_fail: "Run code review first and record QAEvaluator only as the independent acceptance lane."

  - id: INV_QA2
    check: "QA evaluation round is always between 1 and 10, and round 10 is terminal"
    scope: all_rounds
    condition: "qa_evaluation_mode == required"
    on_fail: "Clamp QA execution to the 10-round cap and return the final verdict with remaining failed acceptance items instead of starting round 11."

  - id: INV_QA3
    check: "QAEvaluator does not invent domain rubrics, subjective standards, or domain-quality penalties when no acceptance criteria, Done Contract, domain_context, or rubric_refs scope them"
    scope: all_rounds
    condition: "qa_evaluation_mode == required"
    on_fail: "Discard unscoped domain rubric output and rerun QA with references/domain-rubrics.md conditional selection rules."

  - id: INV_QA4
    check: "QA findings require acceptance criteria, Done Contract, verification evidence, scoped domain-context support, and debate_record when Done Contract exists"
    scope: all_rounds
    condition: "qa_evaluation_mode == required"
    on_fail: "Move unsupported QA concerns to non-blocking observations or request missing context with NEEDS_CONTEXT/BLOCKED."

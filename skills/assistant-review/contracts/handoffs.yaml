# Review Handoff Contracts
# Defines the data shape between Orchestrator and Reviewer subagent.
# The review skill dispatches a fresh Reviewer each round for medium+ scope only
# when subagent_execution_mode=delegated. Direct fallback uses the same review
# fields as local evidence without spawning a subagent.

schema_version: "1.0"
contract: handoffs
skill: assistant-review

worker_status_protocol:
  description: "Reviewer returns include a compact status packet while preserving the findings/rubric schema."
  statuses:
    - value: DONE
      meaning: "No known concerns; requested review completed and no must-fix or should-fix findings remain."
    - value: DONE_WITH_CONCERNS
      meaning: "Review completed and is usable, but follow-up risk or nit-level concerns exist."
    - value: NEEDS_CONTEXT
      meaning: "Orchestration must clarify missing review material or requirements before review can proceed."
    - value: BLOCKED
      meaning: "Cannot proceed because an environment, dependency, permission, or tool issue prevents review."
  packet_rules:
    - "status is required on every Reviewer return."
    - "findings, summary, and verdict remain required and are not replaced by status."
    - "evidence is required to support the verdict and any findings."
    - "open_questions is required for NEEDS_CONTEXT and BLOCKED."
    - "status is required on every QAEvaluator return."
    - "QAEvaluator returns acceptance_findings, qa_scorecard, final_verdict, result, evidence, and score_progression or score_entry; selected_domain_rubrics and domain_quality_scores are required only when scoped domain rubrics are selected. QA evaluation does not replace Reviewer/code-reviewer findings."
    - "Reviewer and QAEvaluator may return pivot_restart_signal for PIVOT, STAGNATION, repeated DRIFT, or repeated REGRESSION; the orchestrator owns the final pivot_restart_decision."

handoffs:

  # ─────────────────────────────────────────────
  # Orchestrator → Reviewer (per round)
  # ─────────────────────────────────────────────
  - name: orchestrator_to_reviewer
    from: Orchestrator
    to: Reviewer
    phase: REVIEW_STEP
    notes: "Fresh Reviewer dispatch each round for medium+ scope when subagent_execution_mode=delegated. For direct_fallback, preserve the same fields as local review evidence without spawning. For trivial/small, self-review is acceptable."

    context_fields:
      - name: review_material_snapshot
        type: object
        required: true
        description: "The material available to review, captured as a scope snapshot rather than assuming a diff"
        validation: "Non-empty. Must include enough material to support concrete file/content findings."
        object_fields:
          - name: kind
            type: enum
            required: true
            enum_values: [diff, files, task_snapshot, pr_snapshot, content]
            description: "Shape of the review material"
          - name: summary
            type: string
            required: true
            description: "Concise description of what the snapshot covers"
          - name: material
            type: string
            required: true
            description: "Actual diff, file contents/excerpts, task or PR snapshot, or pasted content"
          - name: files
            type: string[]
            required: false
            default: []
            description: "Known files covered by the snapshot"
          - name: source_ref
            type: string
            required: false
            default: null
            description: "Optional PR URL, task journal path, command, or user-provided label"

      - name: round
        type: int
        required: true
        description: "Current review round number (1-10)"
        validation: ">= 1 and <= 10"

      - name: previously_fixed
        type: object[]
        required: true
        description: "Items fixed in prior rounds — Reviewer MUST NOT re-report these"
        object_fields:
          - name: description
            type: string
            required: true
          - name: fixed_in_round
            type: int
            required: true
            validation: ">= 1 and <= 10"

      - name: finding_filter_policy
        type: string
        required: true
        description: "Evidence-backed finding filter for this round"
        validation: "Must state that findings require file/line evidence, concrete impact, and the smallest useful fix; speculative concerns are Observations and do not block; round 10 remains terminal."
        notes: "In rounds 8-10, only must-fix or high-confidence should-fix findings count as blockers. The loop never starts round 11."

      - name: project_type
        type: string
        required: false
        description: "Project type if known (e.g., 'C# ASP.NET Core') — enables language-specific checks"

      - name: review_focus
        type: string[]
        required: false
        description: "Specific areas to focus on if the orchestrator wants targeted review. The default review focus still includes the clean-code principle lens from references/review-principles.md."
        examples:
          - "security"
          - "error handling"
          - "test coverage"
          - "architecture violations"
          - "SOLID/KISS/DRY/YAGNI and readability"

      - name: quality_principles_required
        type: boolean
        required: false
        default: true
        description: "Whether Reviewer must apply SOLID, KISS, DRY, YAGNI, and readability checks from references/review-principles.md"
        notes: "Default true for every review. Findings still require concrete evidence, concrete risk, and the smallest durable fix."

      - name: semantic_contract_review_required
        type: boolean
        required: false
        default: false
        description: "Whether Reviewer must apply the Semantic Contract Review Checklist for skill/workflow/framework changes"
        notes: "Set true for changes under skills/, plugin-local skill copies, contracts, evals, prompts, hooks/generated instructions that drive agent behavior, or named-method adaptations."

      - name: behavioral_contract_review_required
        type: boolean
        required: false
        default: false
        description: "Whether Reviewer must apply the Behavioral Contract Review Checklist for behavior-bearing code changes"
        notes: "Set true for public API, domain/business logic, persistence, auth/permissions, money, config/feature flag, external protocol/SDK, algorithm, infra/deploy, generated schema/client, or similar runtime-behavior changes."

      - name: agentic_loop_safety_review_required
        type: boolean
        required: false
        default: false
        description: "Whether Reviewer must apply the Agentic Loop Safety Checklist"
        notes: "Set true for agent/workflow/retry/search/tool/subagent/background loops or repeated model/API calls."

      - name: rubric_required
        type: boolean
        required: false
        description: "Whether the reviewer must return rubric scores (default: true for medium+ scope)"
        notes: "Set to false for trivial/small scope single-round clean passes."

    return_fields:
      - name: status
        type: enum
        required: true
        enum_values: [DONE, DONE_WITH_CONCERNS, NEEDS_CONTEXT, BLOCKED]
        description: "Worker status packet result; DONE requires verdict=clean with no must-fix or should-fix findings"

      - name: round
        type: int
        required: true
        description: "Echo back the round number for tracking"
        validation: ">= 1 and <= 10"

      - name: findings
        type: object[]
        required: true
        description: "All evidence-backed findings that satisfy the finding_filter_policy for this round"
        object_fields:
          - name: severity
            type: enum
            required: true
            enum_values: [must-fix, should-fix, nit]
          - name: file
            type: string
            required: true
            validation: "Must be a file path covered by the reviewed material, or a stable content label when reviewing pasted content"
          - name: line
            type: int
            required: false
            description: "Line number in the file (not the diff line number)"
          - name: description
            type: string
            required: true
            validation: "Specific and actionable — not vague ('could be better')"
          - name: confidence_pct
            type: int
            required: true
            validation: "Evidence-calibrated confidence value; used for explanation and late-round should-fix blocking, not numeric threshold gating"
          - name: suggestion
            type: string
            required: false
            description: "Concrete fix suggestion when applicable"

      - name: observations
        type: object[]
        required: false
        description: "Speculative or low-evidence concerns that do not block completion"
        object_fields:
          - name: description
            type: string
            required: true
          - name: evidence_gap
            type: string
            required: true
          - name: follow_up
            type: string
            required: false

      - name: summary
        type: string
        required: true
        description: "1-paragraph overall assessment of code quality"
        validation: "Non-empty. Must reference specific patterns observed, not generic praise."

      - name: evidence
        type: object[]
        required: true
        description: "Review material, files, searches, or checks used to support findings and verdict"
        min_items: 1
        object_fields:
          - name: source
            type: string
            required: true
          - name: detail
            type: string
            required: true

      - name: agentic_loop_safety_checks
        type: object
        required: false
        condition: "agentic_loop_safety_review_required is true"
        description: "Compact confirmation that agentic loop safety review was applied"
        object_fields:
          - name: bounded_execution
            type: string
            required: true
            description: "Whether max steps/rounds/time/cost budget exists and is appropriate"
          - name: stop_condition
            type: string
            required: true
            description: "Whether success, budget, blocker, and escalation exits are explicit"
          - name: retry_and_empty_result_handling
            type: string
            required: true
            description: "Whether retries and empty results have capped fallback behavior"
          - name: tool_error_handling
            type: string
            required: true
            description: "Whether tool/API failures route to retry, fallback, blocker, or degraded result"
          - name: progress_and_stagnation_detection
            type: string
            required: true
            description: "Whether repeated iterations require progress and handle stagnation"
          - name: cost_token_guardrails
            type: string
            required: true
            description: "Whether paid API/model/subagent/large-context loops have budget awareness"
          - name: low_confidence_escalation
            type: string
            required: true
            description: "Whether insufficient evidence, uncertain outcomes, or low confidence route to escalation, fallback, BLOCKED, or degraded result instead of claiming success"

      - name: behavioral_contract_checks
        type: object
        required: false
        condition: "behavioral_contract_review_required is true"
        description: "Compact confirmation that behavioral contract review was applied"
        object_fields:
          - name: existing_behavior_and_invariants
            type: string
            required: true
            description: "Whether existing behavior, invariants, compatibility assumptions, and edge cases still hold"
          - name: interface_implementation_alignment
            type: string
            required: true
            description: "Whether public APIs, DTOs, schemas, docs/examples, config, generated clients, and implementation agree"
          - name: test_inheritance_coverage
            type: string
            required: true
            description: "Whether tests cover inherited behavior plus new behavior and cannot pass a fake/incomplete implementation"
          - name: protocol_algorithm_fidelity
            type: string
            required: true
            description: "Whether known protocol/algorithm/business-rule semantics are preserved or not applicable"
          - name: high_impact_operation_guards
            type: string
            required: true
            description: "Whether money/auth/data deletion/privacy/safety/production-impact paths have appropriate guardrails or not applicable"
          - name: runtime_surface_sync
            type: string
            required: true
            description: "Whether code/tests/docs/config/migrations/generated clients/deploy/runbook surfaces are synced or not applicable"

      - name: semantic_contract_checks
        type: object
        required: false
        condition: "semantic_contract_review_required is true"
        description: "Compact confirmation that semantic contract review was applied"
        object_fields:
          - name: inherited_contract_obligations
            type: string
            required: true
            description: "Whether method/template outputs satisfy inherited base contracts or condition them explicitly"
          - name: template_contract_alignment
            type: string
            required: true
            description: "Whether SKILL.md/templates/contracts/phase gates/handoffs/references name consistent artifacts"
          - name: eval_inheritance_coverage
            type: string
            required: true
            description: "Whether evals require both new behavior and inherited base artifacts"
          - name: external_method_signature_fidelity
            type: string
            required: true
            description: "Whether named-method adaptations preserve the defining loop or mark not applicable"
          - name: high_stakes_recommendation_guard
            type: string
            required: true
            description: "Whether high-stakes recommendation paths have appropriate guardrails or are not applicable"
          - name: mirror_surface_sync
            type: string
            required: true
            description: "Whether root/plugin/generated/docs/hook surfaces that can drive behavior are synced or not applicable"

      - name: principle_checks
        type: object
        required: false
        condition: "quality_principles_required is true"
        description: "Compact confirmation that the clean-code principle lens was applied"
        object_fields:
          - name: solid
            type: string
            required: true
            description: "SOLID observations or 'no concrete risk found'"
          - name: kiss
            type: string
            required: true
            description: "KISS observations or 'no concrete risk found'"
          - name: dry
            type: string
            required: true
            description: "DRY observations or 'no concrete risk found'"
          - name: yagni
            type: string
            required: true
            description: "YAGNI observations or 'no concrete risk found'"
          - name: readability
            type: string
            required: true
            description: "Readability observations or 'no concrete risk found'"

      - name: verdict
        type: enum
        required: true
        enum_values: [clean, has_must_fix, has_should_fix, has_nits_only]
        description: "Overall result for this round"
        validation: >
          clean: findings is empty or contains only items below threshold.
          has_must_fix: at least one finding with severity=must-fix.
          has_should_fix: no must-fix, but at least one should-fix.
          has_nits_only: only nit-level findings.

      - name: open_questions
        type: string[]
        required: false
        condition: "status in [NEEDS_CONTEXT, BLOCKED]"
        description: "Questions or blocker details the orchestrator must resolve"

      - name: rubric_scores
        type: object
        required: false
        condition: "rubric_required is true (default for medium+ scope)"
        description: "Structured rubric scores per references/review-rubric.md"
        object_fields:
          - name: correctness
            type: float
            required: true
            validation: "1.0 to 5.0 in 0.5 increments"
          - name: code_quality
            type: float
            required: true
            validation: "1.0 to 5.0 in 0.5 increments"
          - name: architecture
            type: float
            required: true
            validation: "1.0 to 5.0 in 0.5 increments"
          - name: security
            type: float
            required: true
            validation: "1.0 to 5.0 in 0.5 increments"
          - name: test_coverage
            type: float
            required: true
            validation: "1.0 to 5.0 in 0.5 increments"
          - name: weighted_score
            type: float
            required: true
            validation: "Calculated per rubric formula. Must match dimension * weight sum."
          - name: action
            type: enum
            required: true
            enum_values: [PASS, REFINE, PIVOT]
            validation: "Determined by weighted_score vs threshold for current round"
          - name: score_justification
            type: object
            required: true
            description: "Per-dimension justification citing specific code"
            object_fields:
              - name: correctness
                type: string
                required: true
              - name: code_quality
                type: string
                required: true
              - name: architecture
                type: string
                required: true
              - name: security
                type: string
                required: true
              - name: test_coverage
                type: string
                required: true
          - name: critical_override
            type: string
            required: false
            description: "If a critical finding caps the score, describe it here"

      - name: pivot_restart_signal
        type: object
        required: false
        condition: "rubric_scores.action == PIVOT or score tracking detects STAGNATION, repeated DRIFT, or repeated REGRESSION"
        description: "Signal that the review loop needs orchestrator-owned pivot/restart handling before another fix/review dispatch."
        object_fields:
          - name: trigger
            type: enum
            required: true
            enum_values: [STAGNATION, repeated_DRIFT, repeated_REGRESSION, pivot]
          - name: evidence
            type: object[]
            required: true
            min_items: 1
            object_fields:
              - name: source
                type: string
                required: true
              - name: detail
                type: string
                required: true
          - name: affected_round
            type: int
            required: true
            validation: ">= 1 and <= 10"
          - name: recommended_recovery_focus
            type: string
            required: true
            description: "Lowest-scoring dimensions, stale-context concern, or blocker evidence the orchestrator should consider"

    on_missing_field: "In delegated mode, re-dispatch Reviewer. In direct fallback mode, complete the local review evidence before continuing. status, findings, evidence, and verdict are never optional — a review without them is not a review."

  # ─────────────────────────────────────────────
  # Orchestrator → QAEvaluator (per QA round)
  # ─────────────────────────────────────────────
  - name: orchestrator_to_qa_evaluator
    from: Orchestrator
    to: QAEvaluator
    phase: QA_EVALUATION_STEP
    notes: "Runs after build/test evidence and Code Reviewer or Reviewer compatibility evidence. QA evaluation is an acceptance lane and does not replace code-reviewer."

    context_fields:
      - name: done_contract
        type: object
        required: conditional
        condition: "task has an accepted Done Contract"
        description: "Accepted Done Contract for the work under QA evaluation"
        validation: "Includes done_when, not_done_when, verification, owner_consumer, acceptance_criteria, debate_record with at least two perspectives, and accepted_by when present"
        object_fields:
          - name: done_when
            type: string[]
            required: true
          - name: not_done_when
            type: string[]
            required: true
          - name: verification
            type: string[]
            required: true
          - name: owner_consumer
            type: string
            required: true
          - name: acceptance_criteria
            type: string[]
            required: true
          - name: debate_record
            type: object[]
            required: true
            min_items: 2
            description: "pre-build debate/subagent-perspective evidence considered before accepting the Done Contract"
            validation: "At least two perspectives; delegated mode uses subagent perspectives when available"
            object_fields:
              - name: perspective
                type: string
                required: true
              - name: concern_or_support
                type: string
                required: true
              - name: resolution
                type: string
                required: true
          - name: accepted_by
            type: string
            required: true

      - name: acceptance_criteria
        type: string[]
        required: true
        description: "Binary acceptance criteria from the user request, approved plan, slice manifest, or Done Contract"
        validation: "At least one independently evaluable criterion is present"
        min_items: 1

      - name: verification_evidence
        type: object[]
        required: true
        description: "Build, test, manual, review, or inspection evidence used to prove acceptance"
        validation: "At least one evidence entry exists; each entry states source, result, and what it proves"
        min_items: 1
        object_fields:
          - name: source
            type: string
            required: true
          - name: result
            type: string
            required: true
          - name: proves
            type: string
            required: true

      - name: code_review_result
        type: object
        required: true
        description: "Final Code Reviewer or Reviewer compatibility result that QA must not replace"
        validation: "Names the review role used, final result, review rounds, and remaining code-review risks if any"
        object_fields:
          - name: role
            type: enum
            required: true
            enum_values: [CodeReviewer, Reviewer]
          - name: result
            type: string
            required: true
          - name: rounds
            type: int
            required: true
            validation: ">= 1 and <= 10"
          - name: remaining_risks
            type: string[]
            required: true

      - name: domain_context
        type: object
        required: false
        default: null
        description: "Scoped product, UX, docs, DX, or domain notes for QA evaluation"
        notes: "When present, QAEvaluator may load references/domain-rubrics.md and select only matching rubric families."
        object_fields:
          - name: summary
            type: string
            required: true
          - name: in_scope_surfaces
            type: string[]
            required: true

      - name: rubric_refs
        type: string[]
        required: false
        default: []
        description: "Explicit rubric family references for product, UX, UI/visual, docs, DX, or domain quality"
        notes: "Valid families are defined in references/domain-rubrics.md. QAEvaluator must not invent rubrics when rubric_refs are empty and no acceptance/Done Contract/domain_context scope requires them."

      - name: round
        type: int
        required: true
        description: "Current QA evaluation round number (1-10)"
        validation: ">= 1 and <= 10"

      - name: previously_failed_acceptance_items
        type: object[]
        required: true
        description: "Acceptance items failed in previous QA rounds; QAEvaluator should not re-report resolved items"
        object_fields:
          - name: criterion
            type: string
            required: true
          - name: failed_in_round
            type: int
            required: true
            validation: ">= 1 and <= 10"
          - name: evidence_gap
            type: string
            required: true

      - name: qa_filter_policy
        type: string
        required: true
        description: "Evidence-backed QA finding filter for this round"
        validation: "Must state that QA findings require acceptance criteria, Done Contract, verification evidence, scoped domain-context support, and debate_record when Done Contract exists; speculative concerns are non-blocking; round 10 is terminal."

    return_fields:
      - name: status
        type: enum
        required: true
        enum_values: [DONE, DONE_WITH_CONCERNS, NEEDS_CONTEXT, BLOCKED]
        description: "Worker status packet result; DONE requires final_verdict=accepted"

      - name: round
        type: int
        required: true
        description: "Echo back the QA round number"
        validation: ">= 1 and <= 10"

      - name: acceptance_findings
        type: object[]
        required: true
        description: "Acceptance, Done Contract, verification, or scoped domain findings for this QA round"
        object_fields:
          - name: severity
            type: enum
            required: true
            enum_values: [blocker, concern, observation]
          - name: criterion
            type: string
            required: true
          - name: evidence
            type: string
            required: true
          - name: impact
            type: string
            required: true
          - name: recommendation
            type: string
            required: false

      - name: qa_scorecard
        type: object
        required: true
        description: "Compact QA scores; domain_quality is backed by selected_domain_rubrics/domain_quality_scores only when domain rubrics are scoped"
        object_fields:
          - name: acceptance_coverage
            type: float
            required: true
            validation: "1.0 to 5.0 in 0.5 increments"
          - name: evidence_strength
            type: float
            required: true
            validation: "1.0 to 5.0 in 0.5 increments"
          - name: domain_quality
            type: float
            required: true
            validation: "1.0 to 5.0 in 0.5 increments; use 5.0 when no scoped domain quality surface applies and state not_applicable in rationale"
          - name: final_readiness
            type: float
            required: true
            validation: "1.0 to 5.0 in 0.5 increments"
          - name: weighted_score
            type: float
            required: true
            validation: "Calculated from the compact QA scorecard dimensions"
          - name: rationale
            type: object
            required: true
            object_fields:
              - name: acceptance_coverage
                type: string
                required: true
              - name: evidence_strength
                type: string
                required: true
              - name: domain_quality
                type: string
                required: true
              - name: final_readiness
                type: string
                required: true

      - name: selected_domain_rubrics
        type: string[]
        required: false
        condition: "domain_context or rubric_refs is present, or acceptance criteria / Done Contract require subjective/product/UX/docs/DX/UI/domain craft evaluation"
        description: "Rubric families selected from references/domain-rubrics.md for this QA round"
        validation: "Every selected family is tied to acceptance criteria, Done Contract, domain_context, or explicit rubric_refs. Empty or omitted when no scoped domain rubric applies."

      - name: domain_quality_scores
        type: object[]
        required: false
        condition: "selected_domain_rubrics is non-empty"
        description: "Per-family domain rubric scores from references/domain-rubrics.md"
        validation: "Each score cites scoped evidence and uses pass/refine/pivot or accepted/rejected guidance; unscoped dimensions are not_applicable, not invented."
        object_fields:
          - name: rubric_ref
            type: string
            required: true
            description: "Selected rubric family, such as ui_visual_design, ux_product_acceptance, documentation_quality, developer_experience, or domain_specific_craft"
          - name: dimension
            type: string
            required: true
            description: "Selected dimension within the rubric family"
          - name: score
            type: float
            required: true
            validation: "1.0 to 5.0 in 0.5 increments. For action=not_applicable, use 5.0 and state the unscoped rationale in evidence."
          - name: action
            type: enum
            required: true
            enum_values: [accepted, accepted_with_concerns, refine, rejected, pivot, not_applicable]
          - name: evidence
            type: string
            required: true
            validation: "Cites acceptance criteria, Done Contract, domain_context, rubric_refs, verification artifacts, screenshots, docs, or concrete files"

      - name: final_verdict
        type: enum
        required: true
        enum_values: [accepted, accepted_with_concerns, rejected, blocked]
        description: "Final QA acceptance verdict for this round"

      - name: result
        type: enum
        required: true
        enum_values: [CLEAN, ISSUES_FIXED, HAS_REMAINING_ITEMS, BLOCKED]
        description: "Loop-compatible result summary"

      - name: evidence
        type: object[]
        required: true
        description: "Acceptance material, files, review results, verification evidence, or checks supporting the QA verdict"
        min_items: 1
        object_fields:
          - name: source
            type: string
            required: true
          - name: detail
            type: string
            required: true

      - name: score_entry
        type: object
        required: true
        description: "Score progression entry for this QA round"
        object_fields:
          - name: round
            type: int
            required: true
            validation: ">= 1 and <= 10"
          - name: weighted_score
            type: float
            required: true
          - name: failed_acceptance_count
            type: int
            required: true
          - name: delta
            type: string
            required: true
          - name: drift_status
            type: enum
            required: true
            enum_values: [GENUINE, SUSPICIOUS, DRIFT, REGRESSION, STAGNATION, NEUTRAL, NOT_APPLICABLE]

      - name: score_progression
        type: object[]
        required: false
        description: "Full QA score progression when the evaluator has prior round history"
        object_fields:
          - name: round
            type: int
            required: true
            validation: ">= 1 and <= 10"
          - name: weighted_score
            type: float
            required: true
          - name: failed_acceptance_count
            type: int
            required: true
          - name: drift_status
            type: enum
            required: true
            enum_values: [GENUINE, SUSPICIOUS, DRIFT, REGRESSION, STAGNATION, NEUTRAL, NOT_APPLICABLE]

      - name: open_questions
        type: string[]
        required: false
        condition: "status in [NEEDS_CONTEXT, BLOCKED] or final_verdict == blocked"
        description: "Questions or blocker details the orchestrator must resolve"

      - name: pivot_restart_signal
        type: object
        required: false
        condition: "score_entry.drift_status == STAGNATION, repeated QA DRIFT/REGRESSION is detected, or any scoped domain_quality_scores action == pivot"
        description: "Signal that the QA loop needs orchestrator-owned pivot/restart handling before another QA/build dispatch."
        object_fields:
          - name: trigger
            type: enum
            required: true
            enum_values: [STAGNATION, repeated_DRIFT, repeated_REGRESSION, pivot]
          - name: evidence
            type: object[]
            required: true
            min_items: 1
            object_fields:
              - name: source
                type: string
                required: true
              - name: detail
                type: string
                required: true
          - name: affected_round
            type: int
            required: true
            validation: ">= 1 and <= 10"
          - name: recommended_recovery_focus
            type: string
            required: true
            description: "Acceptance gap, evidence gap, domain pivot evidence, or stale QA context the orchestrator should consider"

    on_missing_field: "In delegated mode, re-dispatch QAEvaluator. In direct fallback mode, complete the local QA evidence before continuing. status, acceptance_findings, qa_scorecard, final_verdict, result, evidence, and score_entry are never optional. When scoped domain rubrics are selected, selected_domain_rubrics and domain_quality_scores are also required; when not scoped, do not fabricate them."

# ─────────────────────────────────────────────
# Validation behavior:
# 1. Before delegated dispatch or direct-fallback review: verify all required context_fields are populated
# 2. Build finding_filter_policy from round number and hard-cap rules; do not compute numeric confidence tiers
# 3. After return: verify status, findings[], summary, evidence, and verdict are all present
# 4. Move speculative or low-evidence items to observations; findings require file/line evidence, concrete impact, and a smallest useful fix
# 5. Filter any findings that match previously_fixed descriptions
# 6. If rubric_required: verify rubric_scores is present with all dimensions
# 7. If rubric_required: verify weighted_score matches the dimension * weight calculation
# 8. If quality_principles_required: verify the Reviewer applied references/review-principles.md
# 9. If pivot_restart_signal is present, stop the current loop path until the orchestrator records pivot_restart_decision; do not silently continue.
# 10. If round == 10, exit with CLEAN, ISSUES_FIXED, or HAS_REMAINING_ITEMS; never start round 11
# 11. If delegated re-dispatch or direct-fallback completion is needed: include explicit note about what was missing
# 12. If qa_evaluation_mode=required, run orchestrator_to_qa_evaluator after build/test and code-review evidence; include debate_record when Done Contract exists; never treat QA evaluation as a replacement for Reviewer/code-reviewer.
# 13. If QA round == 10, return accepted, accepted_with_concerns, rejected, or blocked with remaining failed acceptance items; never start QA round 11.
# 14. If domain_context/rubric_refs or subjective/product/UX/docs/DX/UI/domain acceptance scope exists: verify selected_domain_rubrics and domain_quality_scores are present and evidence-backed.
# 15. If no scoped domain rubric applies: verify QAEvaluator did not invent rubrics or penalize domain_quality for missing unscoped evidence.
# ─────────────────────────────────────────────
